schema_version: 1
kind: agent-model-selection
metadata:
  example: true
  generated_by: example
  generated_at: "2026-06-20"
  source_policy: .agents/models/selection.md
  notes: >
    Comprehensive example covering direct providers, OpenRouter, local models,
    editor panels, Workshop terminal agents, OpenCode terminal/TUI, OpenCode
    desktop, and inline assistants.

model_access:
  direct_providers:
    - name: Anthropic
      models:
        - Claude Opus 4.1
        - Claude Sonnet 4.5
    - name: GitHub Copilot
      models:
        - GPT-5
        - Claude Sonnet 4.5
    - name: Google
      models:
        - Gemini 2.5 Pro
    - name: OpenAI
      models:
        - GPT-5
  gateways:
    - name: OpenRouter
      models:
        - Claude Opus 4.1
        - Claude Sonnet 4.5
        - Gemini 2.5 Pro
        - DeepSeek R1
  local_runtimes:
    - name: Ollama
      models:
        - Qwen Coder
        - DeepSeek Coder

agent_surfaces:
  - id: zed_agent_panel
    label: Zed Agent Panel
    type: native_panel
    providers_or_gateways:
      - Anthropic
      - OpenRouter
    models:
      - Claude Opus 4.1
      - Claude Sonnet 4.5
      - Gemini 2.5 Pro
    command_execution:
      can_run_shell: true
      mode: confirmation_gated
      workshop_routed: false
      allowed_entrypoints:
        - tools/workshop-shell
        - workshop run snap-pi-hole -- ...
  - id: vscode_extension_panel
    label: VS Code extension panel
    type: native_panel
    providers_or_gateways:
      - GitHub Copilot
    models:
      - GPT-5
      - Claude Sonnet 4.5
    command_execution:
      can_run_shell: false
      mode: disabled
      workshop_routed: false
      allowed_entrypoints: []
  - id: workshop_terminal_cli_tui
    label: Workshop terminal CLI/TUI
    type: workshop_terminal
    providers_or_gateways:
      - OpenAI
      - Anthropic
    models:
      - GPT-5
      - Claude Sonnet 4.5
    command_execution:
      can_run_shell: true
      mode: workshop_shell
      workshop_routed: true
      allowed_entrypoints:
        - tools/workshop-shell
        - workshop run snap-pi-hole -- shell
  - id: opencode_terminal_tui
    label: OpenCode terminal/TUI
    type: terminal_tui
    providers_or_gateways:
      - OpenRouter
    models:
      - Claude Sonnet 4.5
      - Gemini 2.5 Pro
      - DeepSeek R1
    command_execution:
      can_run_shell: true
      mode: workshop_shell
      workshop_routed: true
      allowed_entrypoints:
        - tools/workshop-shell
        - workshop run snap-pi-hole -- shell
  - id: opencode_desktop
    label: OpenCode desktop
    type: desktop_agent
    providers_or_gateways:
      - OpenRouter
    models:
      - Claude Opus 4.1
      - Gemini 2.5 Pro
    command_execution:
      can_run_shell: true
      mode: unknown
      workshop_routed: false
      allowed_entrypoints: []
  - id: inline_assistant
    label: Inline assistant
    type: inline_assistant
    providers_or_gateways:
      - GitHub Copilot
    models:
      - Copilot completions
    command_execution:
      can_run_shell: false
      mode: disabled
      workshop_routed: false
      allowed_entrypoints: []

assignments:
  router:
    surface_id: null
    model: null
    provider_or_gateway: null
    rationale: Surface-agnostic intake role.
  architect:
    surface_id: zed_agent_panel
    model: Claude Opus 4.1
    provider_or_gateway: Anthropic or OpenRouter
    rationale: Strongest planning model on a suitable planning surface.
  implementer:
    surface_id: opencode_terminal_tui
    model: Claude Sonnet 4.5
    provider_or_gateway: OpenRouter
    rationale: >
      Reliable coding model on a command-running surface launched from
      tools/workshop-shell.
  reviewer:
    surface_id: vscode_extension_panel
    model: GPT-5
    provider_or_gateway: GitHub Copilot
    rationale: Strong independent review surface with terminal tools disabled.
  inline_assistant:
    surface_id: inline_assistant
    model: Copilot completions
    provider_or_gateway: GitHub Copilot
    rationale: Human-steered small edits.
