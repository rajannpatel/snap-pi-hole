schema_version: 1
kind: agent-model-selection-schema
description: Machine-readable contract for generated agent role assignments.
source_policy: .agents/models/selection.md

required_top_level:
  - schema_version
  - kind
  - metadata
  - model_access
  - agent_surfaces
  - assignments

allowed_inventory_output_paths:
  - .agents/local/model-selection.yaml
  - .agents/models/selection.local.yaml
  - .agents/models/selection.personal.yaml
default_inventory_output_path: .agents/local/model-selection.yaml
alternative_inventory_output_paths:
  - .agents/models/selection.local.yaml
  - .agents/models/selection.personal.yaml

roles:
  - router
  - architect
  - implementer
  - reviewer
  - inline_assistant

model_access_groups:
  - direct_providers
  - gateways
  - local_runtimes

surface_types:
  - native_panel
  - workshop_terminal
  - terminal_tui
  - desktop_agent
  - inline_assistant

command_execution_modes:
  - disabled
  - denied
  - confirmation_gated
  - workshop_entrypoints_only
  - workshop_shell
  - unknown

safe_implementer_surface:
  requires:
    can_run_shell: true
    workshop_routed: true
  allowed_modes:
    - workshop_entrypoints_only
    - workshop_shell
  allowed_entrypoints:
    - tools/workshop-shell
    - workshop run snap-pi-hole -- shell
    - workshop run snap-pi-hole -- ...

native_panel_rule:
  allowed_for:
    - architect
    - reviewer
    - inline_assistant
  implementer_requires_workshop_routed_shell: true

desktop_agent_rule:
  implementer_requires_workshop_routed_shell: true
  unsafe_when_terminal_execution_unknown: true

generation_rules:
  single_output_path_per_request: true
  use_default_output_path_unless_explicitly_overridden: true
  use_template_as_starting_structure: .agents/models/selection.template.yaml
  validate_against_schema: .agents/models/selection.schema.yaml
  populate_only_from_user_supplied_model_access_and_surfaces: true
  preserve_exact_provider_model_surface_names: true
  assume_surfaces_available_unless_user_says_otherwise:
    - zed_agent_panel
    - vscode_extension_panel
    - inline_assistant
    - workshop_terminal_cli_tui
  workshop_terminal_cli_tui_command_behavior:
    can_run_shell: true
    mode: workshop_shell
    workshop_routed: true
  do_not_invent:
    - providers
    - models
    - gateways
    - local_runtimes
    - editor_surfaces
    - command_permissions
    - role_assignments
  stop_and_ask_if_missing:
    - required_schema_field
    - role_assignment
    - command_routing_or_permission_behavior
  do_not_inspect:
    - secrets
    - api_keys
    - provider_configuration
    - account_files
    - private_settings
    - private_gateway_configuration
    - local_runtime_configuration
    - editor_specific_tool_permissions

forbidden_committed_fields:
  - api_key
  - token
  - secret
  - password
  - private_endpoint
  - account_id
