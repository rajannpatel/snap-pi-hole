---
name: snap-pi-hole
base: ubuntu@26.04

sdks:
  - name: uv
    channel: latest/stable
  - name: project-tools
  - name: agy
    channel: latest/stable
  - name: copilot
    channel: latest/stable
  - name: kiro
    channel: latest/edge
  - name: system
    plugs:
      admin-web:
        interface: tunnel
        endpoint: localhost:8080/tcp
      dns-tcp:
        interface: tunnel
        endpoint: localhost:5300/tcp
      dns-udp:
        interface: tunnel
        endpoint: localhost:5300/udp

# Workshop wires these tunnel plugs to matching tool slots by name. Keep the
# plug names aligned with the expected tunnel names instead of duplicating them
# in an explicit connections block.

actions:
  doctor: |
    echo "==> Toolchain"
    command -v awk
    command -v bats
    command -v curl
    command -v dig
    command -v fd
    command -v g++
    command -v gcc
    command -v gh
    command -v git
    command -v jq
    command -v kcov
    command -v make
    command -v node
    command -v nodejs
    command -v npm
    command -v npx
    command -v pre-commit
    command -v python3
    command -v rg
    command -v ruby
    command -v sed
    command -v shellcheck
    command -v snapcraft
    command -v tree
    command -v uv
    command -v wget
    command -v yamllint
    command -v yq
    dpkg-query -W -f='${Status}' build-essential | grep -qx "install ok installed"
    echo "==> Snapcraft"
    snapcraft version
    echo "==> snapd"
    snap version

  context: |
    set -euo pipefail
    echo "==> Repository"
    git status --short
    echo
    echo "==> Snap metadata"
    yq '.name, .base, .confinement, (.apps | keys)' snap/snapcraft.yaml
    echo
    echo "==> Useful actions"
    yq -r '.actions | keys | .[]' workshop.yaml

  agent-role: |
    set -euo pipefail
    exec tools/agent-role "${@:-}"

  shell: |
    set -euo pipefail
    if [ "$#" -gt 0 ]; then
      exec "$@"
    fi

    export PS1="(workshop:snap-pi-hole) \w \$ "
    echo "Workshop shell for snap-pi-hole"
    echo "Project commands run here inside the Workshop LXD container."
    exec bash --noprofile --norc -i

  lint: |
    pre-commit run --all-files

  deps-js: |
    cd tests
    npm ci
    npx playwright install --with-deps chromium

  lint-js: |
    cd tests
    npm run lint:js

  format-check: |
    cd tests
    npm run format:check

  handoff-implementer: |
    set -euo pipefail
    exec tools/agent-handoff "${@:-}"

  shellcheck: |
    set -euo pipefail
    git ls-files \
      | xargs -r file --mime-type -Nnf- \
      | awk -F: '$2 ~ /shellscript/ { print $1 }' \
      | xargs -r shellcheck --check-sourced --external-sources

  yamllint: |
    yamllint -d "{extends: relaxed, rules: {line-length: disable}}" \
      snap/snapcraft.yaml \
      workshop.yaml

  test: |
    bats -r "${@:-tests/unit}"

  test-jsdom: |
    cd tests
    npm run test:jsdom

  test-playwright-snap: |
    cd tests
    npm run test:playwright

  coverage: |
    tests/scripts/local-preview.sh kcov

  build: |
    sudo snapcraft --destructive-mode --verbosity=brief "$@"

  clean: |
    sudo snapcraft clean "$@"

  install: |
    set -eu
    snap_file="${1:-}"
    if [ -z "$snap_file" ]; then
      shopt -s nullglob
      snaps=(*.snap)
      if [ ${#snaps[@]} -eq 0 ]; then
        echo "No .snap file found. Run: workshop run snap-pi-hole -- build"
        exit 1
      fi
      snap_file="${snaps[0]}"
    fi

    sudo snap remove --purge pihole-by-rajannpatel || true
    sudo snap install "$snap_file" --dangerous

    for plug in \
      firewall-control \
      hardware-observe \
      mount-observe \
      network \
      network-bind \
      network-control \
      network-observe \
      process-control \
      shared-memory \
      system-observe \
      time-control
    do
      sudo snap connect "pihole-by-rajannpatel:${plug}" || true
    done

    sudo snap alias pihole-by-rajannpatel.pihole pihole || true
    sudo snap start --enable pihole-by-rajannpatel.pihole-ftl
    sudo snap services pihole-by-rajannpatel

  smoke: |
    sudo snap services pihole-by-rajannpatel
    pihole status || true
    dig @127.0.0.1 -p 53 example.com +time=2 +tries=1

  logs: |
    sudo snap logs pihole-by-rajannpatel.pihole-ftl -n="${1:-100}"

  debug: |
    sudo pihole-by-rajannpatel.snap-debug || true

  uninstall: |
    sudo snap remove --purge pihole-by-rajannpatel
