StylesPath = .vale/styles
MinAlertLevel = warning
Vocab = Canonical, Custom

[*.md]
# Apply the Canonical rules
BasedOnStyles = Canonical

# Disable the broken upstream Latinisms rule (has capture group regex errors in Vale)
Canonical.025a-latinisms-with-english-equivalents = NO

# Apply custom formatting and style rules
Custom.Pronouns = YES
Custom.BoldBullet = YES
Custom.TOC = YES
Custom.BoldColon = YES
Custom.NoExternalLinksInTOC = YES
Custom.SnapcraftLink = YES
Custom.H4Sandwich = YES
Custom.Separators = YES

# The CVE analysis prompt is an LLM instruction template (program input), not
# human-facing documentation, so the prose style rules do not apply to it.
[snap/local/build/prompts/*.md]
BasedOnStyles =
Custom.Pronouns = NO
Custom.BoldBullet = NO
Custom.TOC = NO
Custom.BoldColon = NO
Custom.NoExternalLinksInTOC = NO
Custom.SnapcraftLink = NO
Custom.H4Sandwich = NO
Custom.Separators = NO
