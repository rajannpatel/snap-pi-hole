name: pihole
title: Pi-hole
summary: Network-wide ad blocking via your own DNS server
license: MIT
icon: snap/gui/pihole.png
adopt-info: ftl

description: |
  Pi-hole is a Linux network-level advertisement and Internet tracker
  blocking application which acts as a DNS sinkhole, intended for use on
  a private network. It is designed to be installed on embedded devices
  with network capability, such as a Raspberry Pi, but it can be used on
  other machines running Linux and cloud implementations.

  This snap packages Pi-hole v6, which consolidates the DNS resolver
  (a fork of dnsmasq), the DHCP server, the HTTP API, and the embedded
  web admin interface into a single binary: pihole-FTL.

  IMPORTANT  -  host setup before starting the daemon:

    1. Port 53 must be free. On most Ubuntu systems systemd-resolved
       holds it. Disable its stub listener:

         sudo mkdir -p /etc/systemd/resolved.conf.d
         printf '[Resolve]\nDNSStubListener=no\n' \
           | sudo tee /etc/systemd/resolved.conf.d/pihole.conf
         sudo systemctl restart systemd-resolved

    2. Connect interfaces and enable the daemon:

         sudo snap connect pihole:network-bind
         sudo snap connect pihole:network-control     # only if using DHCP
         sudo snap connect pihole:firewall-control    # only if using DHCP
         sudo snap start --enable pihole.pihole-ftl

    3. Point your router (or individual clients) at this host's IP for DNS.

  The web admin interface listens on http://<host>/admin by default; the
  password is printed to the daemon log on first start and can be reset
  with `sudo pihole setpassword`.

# Stay in devel until we have a green end-to-end smoke test on real DNS
# traffic. See README.md for the open work list.
grade: devel
confinement: strict
# We use core26 because Pi-hole FTL v6.6.2 dropped support for mbedTLS 2.x
# and now strictly requires mbedTLS >= 3.5.0, as well as Nettle >= 3.9.
base: core26
build-base: devel

# Refuse to install on snapd older than core22's documented floor.
assumes:
  - snapd2.55

# Document the current data-format baseline. Bump to `epoch: 1*` (note
# the trailing asterisk) the first time we ship a revision that changes
# pihole.toml, the gravity.db schema, or a layout path in a way that
# the new revision needs to migrate on first start  -  snapd will then
# hold users on the old epoch until the migration code is in place.
epoch: 0

# core22 still ships a full 32-bit ARM archive, so armhf is supported.
platforms:
  amd64:
  arm64:
  armhf:

# Bind-mount the paths FTL and the bash scripts have hardcoded onto
# writable snap data locations. Inside the snap's mount namespace
# /etc/pihole *is* $SNAP_DATA/etc/pihole, transparently  -  no source
# patching needed for path layout.
#
# Paths audited against pi-hole/FTL v6.6.2 and pi-hole/pi-hole v6.4.2
# sources; see README.md "Architecture" for the cross-reference.
layout:
  # Primary config + state dir (pihole.toml, gravity.db, pihole-FTL.db,
  # dhcp.leases, custom.list, cli_pw, tls.pem, …).
  /etc/pihole:
    bind: $SNAP_DATA/etc/pihole
  # Optional dnsmasq drop-in dir, only consumed when
  # misc.etc_dnsmasq_d=true in pihole.toml.
  /etc/dnsmasq.d:
    bind: $SNAP_DATA/etc/dnsmasq.d
  # Civetweb document root: pi-hole/web v6.5 ships here and is served by
  # the embedded HTTP server. Read-only from inside the snap.
  /var/www/html:
    bind: $SNAP/var/www/html
  # Log files (FTL.log, pihole.log, webserver.log).
  /var/log/pihole:
    bind: $SNAP_COMMON/var/log/pihole
  # Bash-script helper dir (`pihole`, gravity.sh, piholeDebug.sh, etc.).
  # Read-only  -  these are part of the squashfs.
  /opt/pihole:
    bind: $SNAP/opt/pihole

parts:
  # ---------------------------------------------------------------------
  # pihole-FTL: the DNS/DHCP/API/web daemon. C, CMake build.
  # Embeds a vendored dnsmasq.
  # ---------------------------------------------------------------------
  ftl:
    plugin: cmake
    source: https://github.com/pi-hole/FTL.git
    source-type: git
    source-tag: v6.6.2
    source-depth: 1
    override-pull: |
      craftctl default
      craftctl set version="$(git -C "${CRAFT_PART_SRC}" describe --tags --always)"
      # Fix strstr redefinition error on newer glibc (Ubuntu 26.04)
      sed -i 's/#define strstr(haystack, needle)/#undef strstr\n#define strstr(haystack, needle)/' "${CRAFT_PART_SRC}/src/FTL.h"
      # Patch x509.c for MbedTLS 3.x API compatibility (MbedTLS 3.6 strictly requires RNG for PEM generation)
      sed -i '15i #include <mbedtls/psa_util.h>' src/webserver/x509.c
      sed -i 's/mbedtls_x509write_crt_pem(&ca_cert, ca_buffer, sizeof(ca_buffer))/mbedtls_x509write_crt_pem(\&ca_cert, ca_buffer, sizeof(ca_buffer), mbedtls_psa_get_random, MBEDTLS_PSA_RANDOM_STATE)/g' src/webserver/x509.c
      sed -i 's/mbedtls_x509write_crt_pem(&server_cert, cert_buffer, sizeof(cert_buffer))/mbedtls_x509write_crt_pem(\&server_cert, cert_buffer, sizeof(cert_buffer), mbedtls_psa_get_random, MBEDTLS_PSA_RANDOM_STATE)/g' src/webserver/x509.c
      sed -i 's/mbedtls_pk_parse_keyfile(&key, certfile, NULL)/mbedtls_pk_parse_keyfile(\&key, certfile, NULL, mbedtls_psa_get_random, MBEDTLS_PSA_RANDOM_STATE)/g' src/webserver/x509.c
      # Redirect PID files to the strict confinement tmpfs directory allowed by AppArmor
      grep -rlZ '/run/pihole-FTL.pid' "${CRAFT_PART_SRC}" | xargs -0 -r sed -i "s|/run/pihole-FTL.pid|/run/snap.${CRAFT_PROJECT_NAME}/pihole-FTL.pid|g"
      grep -rlZ '/run/dnsmasq.pid' "${CRAFT_PART_SRC}" | xargs -0 -r sed -i "s|/run/dnsmasq.pid|/run/snap.${CRAFT_PROJECT_NAME}/dnsmasq.pid|g"
      # Neutralize dnsmasq's attempt to drop supplementary groups.
      # In a strictly confined snap, daemons run as root without CAP_SETGID
      # by default. Since pihole-FTL passes `-u root` internally, dnsmasq
      # looks up the root group and tries to call setgroups(0) which fails with EPERM.
      sed -i 's/setgroups(0, \&dummy) == -1/0/g' src/dnsmasq/dnsmasq.c
      sed -i 's/setgid(gp->gr_gid) == -1/0/g' src/dnsmasq/dnsmasq.c
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DSTATIC=false
      - -DCMAKE_C_FLAGS="-Wno-error=discarded-qualifiers"
    build-snaps:
      - cmake/3.27/stable
    build-packages:
      - build-essential
      - bind9-dnsutils
      - git
      - libidn2-dev
      - libnettle8
      - nettle-dev
      - libgmp-dev
      - libuv1-dev
      - libcap-dev
      - libreadline-dev
      - libsqlite3-dev
      - libssl-dev
      - libmbedtls-dev
      - libunistring-dev   # added in FTL v6.6.x for Unicode handling
      - python3
      - xxd
    stage-packages:
      - libidn2-0
      - bind9-dnsutils
      - libuv1
      - libcap2
      - libreadline8
      - libsqlite3-0
      - libnettle8
      - libgmp10
      # mbedtls 3.6 SONAMEs on core26. libmbedtls21 transitively
      # pulls libmbedcrypto16 and libmbedx509-7; list explicitly so the
      # link line is reproducible from this file alone.
      - libmbedtls21
      - libmbedcrypto16
      - libmbedx509-7
      - libunistring5
      - ca-certificates
      - jq

  # ---------------------------------------------------------------------
  # pi-hole core: the `pihole` CLI and supporting shell scripts.
  # Patched in-place to swap out `service`/`systemctl` calls for snapctl
  #  -  the rest of the path remapping is handled by the layout block.
  # ---------------------------------------------------------------------
  core:
    plugin: dump
    source: https://github.com/pi-hole/pi-hole.git
    source-type: git
    source-tag: v6.4.2
    source-depth: 1
    override-pull: |
      craftctl default
      cd "${CRAFT_PART_SRC}"
      # piholeLogFlush.sh stops/restarts the daemon via `service`; rewrite
      # to use snapctl so it works inside the sandbox.
      sed -i \
        -e 's|service pihole-FTL stop|snapctl stop pihole.pihole-ftl|g' \
        -e 's|service pihole-FTL restart|snapctl restart pihole.pihole-ftl|g' \
        -e 's|service pihole-FTL start|snapctl start pihole.pihole-ftl|g' \
        advanced/Scripts/piholeLogFlush.sh
      # piholeDebug.sh probes `systemctl status pihole-FTL.service`, which
      # is unreachable from confinement. Neutralise it.
      sed -i 's|systemctl status pihole-FTL.service|true # patched: systemctl unavailable in snap|g' \
        advanced/Scripts/piholeDebug.sh
      # Redirect PID files to the strict confinement tmpfs directory allowed by AppArmor
      grep -rlZ '/run/pihole-FTL.pid' . | xargs -0 -r sed -i "s|/run/pihole-FTL.pid|/run/snap.${CRAFT_PROJECT_NAME}/pihole-FTL.pid|g"
      # Strip readonly modifier from FTL_PID_FILE to prevent bash local variable scope collisions inside subshells
      grep -rlZ 'readonly FTL_PID_FILE' . | xargs -0 -r sed -i 's/readonly FTL_PID_FILE/FTL_PID_FILE/g'
      # Neutralize upstream git version tracking checks inside strict confinement where git binary is stripped
      grep -rlZ 'git' advanced/Scripts/updatecheck.sh | xargs -0 -r sed -i 's|git |true # git disabled inside snap|g'
      
      # Redirect hardcoded /etc/.pihole paths to their corresponding snap paths
      grep -rlZ '/etc/.pihole/advanced/Scripts' . | xargs -0 -r sed -i 's|/etc/.pihole/advanced/Scripts|/opt/pihole|g'
      grep -rlZ '${piholeGitDir}/advanced/Templates' . | xargs -0 -r sed -i 's|${piholeGitDir}/advanced/Templates|/opt/pihole/templates|g'
      
      # Neuter chown commands since snap daemon runs as root and pihole user does not exist
      grep -rlZ 'chown pihole:pihole' . | xargs -0 -r sed -i 's|chown pihole:pihole|true # chown pihole:pihole|g'
      
      # Seed a static template mapping matching our pinned deployment components
      mkdir -p advanced/Templates
      cat > advanced/Templates/versions << 'EOF'
      CORE_VERSION=v6.4.2
      CORE_BRANCH=snap
      WEB_VERSION=v6.5
      WEB_BRANCH=snap
      FTL_VERSION=v6.6.2
      FTL_BRANCH=snap
      EOF

      # Patch-rot guard. If upstream renames a file the sed -i would have
      # errored out and failed the build already; if upstream subtly
      # rewords one of the target strings, the sed silently no-ops and
      # the script ships broken. Fail loudly so we notice on the next
      # version bump.
      if grep -nF 'service pihole-FTL' advanced/Scripts/piholeLogFlush.sh; then
        echo "ERROR: piholeLogFlush.sh still references 'service pihole-FTL' after patch" >&2
        exit 1
      fi
      if grep -nF 'systemctl status pihole-FTL.service' advanced/Scripts/piholeDebug.sh; then
        echo "ERROR: piholeDebug.sh still references 'systemctl status pihole-FTL.service' after patch" >&2
        exit 1
      fi
    override-build: |
      craftctl default
      # Workaround for core26 rust-coreutils AppArmor denial for `truncate` and `timeout`
      mkdir -p "${CRAFT_PART_INSTALL}/usr/bin"
      cp -L /usr/bin/truncate "${CRAFT_PART_INSTALL}/usr/bin/truncate"
      cp -L /usr/bin/timeout "${CRAFT_PART_INSTALL}/usr/bin/timeout"
    organize:
      pihole: opt/pihole/pihole
      gravity.sh: opt/pihole/gravity.sh
      # Upstream `pihole` hardcodes PI_HOLE_SCRIPT_DIR="/opt/pihole" and
      # sources COL_TABLE, utils.sh, api.sh, version.sh, etc. directly from
      # that flat directory. Mirror the layout the upstream installer uses:
      # everything under advanced/Scripts/ lands at /opt/pihole/<file>.
      advanced/Scripts/*: opt/pihole/
      advanced/Templates/versions: opt/pihole/templates/versions
      advanced/Templates/*: opt/pihole/templates
      manpages: usr/share/man-src
    stage:
      - opt/pihole
      - usr/share/man-src
      - usr/bin/truncate
      - usr/bin/timeout

  # ---------------------------------------------------------------------
  # Embedded web admin UI assets, served by FTL's civetweb instance.
  # ---------------------------------------------------------------------
  web:
    plugin: dump
    source: https://github.com/pi-hole/web.git
    source-type: git
    source-tag: v6.5
    source-depth: 1
    organize:
      '*': var/www/html/admin/
    stage:
      - var/www/html
    # Drop upstream-repo housekeeping that has no business inside the
    # snap. Trims ~MB of bloat and shrinks the attack surface.
    prime:
      - -var/www/html/admin/.github
      - -var/www/html/admin/.gitignore
      - -var/www/html/admin/.gitattributes
      - -var/www/html/admin/.editorconfig
      - -var/www/html/admin/.eslintrc*
      - -var/www/html/admin/.stylelintrc*
      - -var/www/html/admin/test
      - -var/www/html/admin/tests
      - -var/www/html/admin/*.md
      - -var/www/html/admin/CONTRIBUTING*
      - -var/www/html/admin/CODE_OF_CONDUCT*
      - -var/www/html/admin/package.json
      - -var/www/html/admin/package-lock.json
      - -var/www/html/admin/composer.*
      - -var/www/html/admin/Gruntfile.js

  # ---------------------------------------------------------------------
  # Launcher scripts and hook helpers that live in this repo.
  # ---------------------------------------------------------------------
  wrappers:
    plugin: dump
    source: snap/local/
    source-type: local
    organize:
      launcher-ftl: bin/launcher-ftl
      launcher-pihole: bin/launcher-pihole
      check-system: bin/check-system
      snapdebug: bin/snapdebug
    stage:
      - bin/launcher-ftl
      - bin/launcher-pihole
      - bin/check-system
      - bin/snapdebug

apps:
  # The daemon. Disabled on install so the operator can free port 53 and
  # review interface connections before it starts.
  pihole-ftl:
    command: bin/launcher-ftl
    daemon: simple
    install-mode: disable
    restart-condition: on-failure
    # Keep the old FTL process running during `snap refresh` so DNS stays
    # up for all clients while snapd swaps in the new revision.  snapd
    # will send SIGTERM to the old process only after the new revision's
    # daemon has started successfully.  Without this, a mid-day refresh
    # drops DNS for every device on the network for several seconds.
    refresh-mode: endure
    # Give FTL time to flush its query DB and gravity state on shutdown.
    stop-timeout: 60s
    plugs:
      - network
      - network-bind
      - network-observe
      - system-observe
      - hardware-observe
      - mount-observe
      - network-control    # required for DHCP server mode only
      - firewall-control   # required for DHCP server mode only
      # FTL creates /dev/shm/FTL-<pid>-lock files for inter-process
      # coordination. The default AppArmor template denies arbitrary
      # writes under /dev/shm. `private: true` gives FTL its own
      # /dev/shm/snap.pihole/ namespace mapped transparently as /dev/shm.
      - shared-memory

  # The `pihole` CLI: `pihole status`, `pihole -g`, `pihole setpassword`, etc.
  # The launcher intercepts subcommands that don't make sense inside a
  # snap (self-update, repair, uninstall, checkout, updatechecker) and
  # prints the snap-native equivalent.
  pihole:
    command: bin/launcher-pihole
    aliases: [pihole]
    plugs:
      - network
      - network-bind
      - network-observe
      - system-observe
      - hardware-observe
      - mount-observe

  # Diagnostic tool to proactively detect and remediate port conflicts
  check-system:
    command: bin/check-system
    plugs:
      - network
      - network-bind

  # Explicit top-level convenience aliases
  status:
    command: bin/launcher-pihole status
    plugs:
      - network
      - network-bind
      - system-observe
  
  health:
    command: bin/check-system
    plugs:
      - network
      - network-bind

  snapdebug:
    command: bin/snapdebug
    plugs:
      - network
      - network-bind
      - system-observe
      - hardware-observe
      - mount-observe

  debug:
    command: bin/launcher-pihole -d
    plugs:
      - network
      - network-bind
      - system-observe
      - hardware-observe
      - mount-observe

  # Automated gravity sync. Runs weekly. Users can customize the schedule using:
  # snap set pihole timer.gravity-sync.schedule="mon,02:00"
  gravity-sync:
    command: bin/launcher-pihole -g
    daemon: oneshot
    timer: sun,03:00~05:00
    plugs:
      - network
      - network-bind
      - network-observe
      - system-observe
      - hardware-observe
      - mount-observe

hooks:
  post-refresh:
    plugs:
      - network
      - network-bind
      - network-observe
      - system-observe
      - hardware-observe
      - mount-observe

# install only mkdir's directories (which the layout bind-mounts already
# grant write access to) and configure only calls snapctl + pihole-FTL.

plugs:
  # Private /dev/shm namespace for FTL. snapd creates
  # /dev/shm/snap.pihole/ on connect and bind-mounts it as /dev/shm
  # inside the snap's namespace, so FTL's hardcoded /dev/shm/FTL-*
  # paths "just work" without patching.
  shared-memory:
    private: true