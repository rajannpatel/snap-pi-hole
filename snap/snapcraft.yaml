name: pihole-by-rajannpatel
title: Pi-hole
summary: Network-wide ad blocking via your own DNS server
license: MIT
icon: snap/gui/pihole.png
adopt-info: pi_hole

description: |
  Pi-hole is a Linux network-level advertisement and Internet tracker
  blocking application which acts as a DNS sinkhole, intended for use on
  a private network. It is designed to be installed on embedded devices
  with network capability, such as a Raspberry Pi, but it can be used on
  other machines running Linux and cloud implementations.

  This snap packages Pi-hole v6, which consolidates the DNS resolver
  (a fork of dnsmasq), the DHCP server, the HTTP API, and the embedded
  web admin interface into a single binary: pihole-FTL.

  IMPORTANT  -  host setup before starting the daemon:

    1. Port 53 must be free. On most Ubuntu systems systemd-resolved
       holds it. Disable its stub listener:

         sudo mkdir -p /etc/systemd/resolved.conf.d
         printf '[Resolve]\nDNSStubListener=no\n' \
           | sudo tee /etc/systemd/resolved.conf.d/pihole.conf
         sudo systemctl restart systemd-resolved

    2. Connect interfaces and enable the daemon:

         sudo snap connect pihole:network-bind
         sudo snap connect pihole:network-control     # only if using DHCP
         sudo snap connect pihole:firewall-control    # only if using DHCP
         sudo snap start --enable pihole.pihole-ftl

    3. Point your router (or individual clients) at this host's IP for DNS.

  The web admin interface listens on http://<host>/admin by default; the
  password is printed to the daemon log on first start and can be reset
  with `sudo pihole setpassword`.

grade: stable
confinement: strict
# We use core26 because Pi-hole FTL v6.6.2 dropped support for mbedTLS 2.x
# and now strictly requires mbedTLS >= 3.5.0, as well as Nettle >= 3.9.
base: core26

# Document the current data-format baseline. Bump to `epoch: 1*` (note
# the trailing asterisk) the first time we ship a revision that changes
# pihole.toml, the gravity.db schema, or a layout path in a way that
# the new revision needs to migrate on first start  -  snapd will then
# hold users on the old epoch until the migration code is in place.
epoch: 0

# core22+ supports all major Ubuntu OS architectures natively.
platforms:
  amd64:
  arm64:
  armhf:
  ppc64el:
  s390x:
  riscv64:

# Bind-mount the paths FTL and the bash scripts have hardcoded onto
# writable snap data locations. Inside the snap's mount namespace
# /etc/pihole *is* $SNAP_DATA/etc/pihole, transparently  -  no source
# patching needed for path layout.
#
# Paths audited against pi-hole/FTL v6.6.2 and pi-hole/pi-hole v6.4.2
# sources; see README.md "Architecture" for the cross-reference.
layout:
  # Primary config + state dir (pihole.toml, gravity.db, pihole-FTL.db,
  # dhcp.leases, custom.list, cli_pw, tls.pem, …).
  /etc/pihole:
    bind: $SNAP_DATA/etc/pihole
  # Optional dnsmasq drop-in dir, only consumed when
  # misc.etc_dnsmasq_d=true in pihole.toml.
  /etc/dnsmasq.d:
    bind: $SNAP_DATA/etc/dnsmasq.d
  # Civetweb document root: pi-hole/web v6.5 ships here and is served by
  # the embedded HTTP server. Read-only from inside the snap.
  /var/www/html:
    bind: $SNAP/var/www/html
  # Log files (FTL.log, pihole.log, webserver.log).
  /var/log/pihole:
    bind: $SNAP_COMMON/var/log/pihole
  # Bash-script helper dir (`pihole`, gravity.sh, piholeDebug.sh, etc.).
  # Read-only  -  these are part of the squashfs.
  /opt/pihole:
    bind: $SNAP/opt/pihole
  # Repository templates and migration scripts (`gravity-db.sh`, SQLite SQL templates).
  # Read-only  -  these are part of the squashfs.
  /etc/.pihole:
    bind: $SNAP/etc/.pihole

parts:
  # ---------------------------------------------------------------------
  # pihole-FTL: the DNS/DHCP/API/web daemon. C, CMake build.
  # Embeds a vendored dnsmasq.
  # ---------------------------------------------------------------------
  ftl:
    plugin: cmake
    source: https://github.com/pi-hole/FTL.git
    source-type: git
    source-tag: v6.6.2
    source-depth: 1
    override-pull: |
      craftctl default
      # Fix strstr redefinition error on newer glibc (Ubuntu 26.04)
      sed -i 's/#define strstr(haystack, needle)/#undef strstr\n#define strstr(haystack, needle)/' "${CRAFT_PART_SRC}/src/FTL.h"

      # Patch x509.c for MbedTLS 3.x API compatibility (MbedTLS 3.6 strictly requires RNG for PEM generation)
      sed -i '15i #include <mbedtls/psa_util.h>' src/webserver/x509.c
      sed -i 's/mbedtls_x509write_crt_pem(&ca_cert, ca_buffer, sizeof(ca_buffer))/mbedtls_x509write_crt_pem(\&ca_cert, ca_buffer, sizeof(ca_buffer), mbedtls_psa_get_random, MBEDTLS_PSA_RANDOM_STATE)/g' src/webserver/x509.c
      sed -i 's/mbedtls_x509write_crt_pem(&server_cert, cert_buffer, sizeof(cert_buffer))/mbedtls_x509write_crt_pem(\&server_cert, cert_buffer, sizeof(cert_buffer), mbedtls_psa_get_random, MBEDTLS_PSA_RANDOM_STATE)/g' src/webserver/x509.c
      sed -i 's/mbedtls_pk_parse_keyfile(&key, certfile, NULL)/mbedtls_pk_parse_keyfile(\&key, certfile, NULL, mbedtls_psa_get_random, MBEDTLS_PSA_RANDOM_STATE)/g' src/webserver/x509.c

      # Redirect PID files to /etc/pihole/ which is layout-mounted to
      # $SNAP_DATA/etc/pihole/ and is visible to ALL snap apps regardless
      # of the snap's store name (avoids CRAFT_PROJECT_NAME vs SNAP_NAME mismatch).
      # Handle /var/run/ before /run/ to avoid partial-match corruption
      # (dnsmasq defaults to /var/run/dnsmasq.pid; a naive s|/run/…| would
      # turn that into /var/etc/pihole/dnsmasq.pid).
      grep -rlZ '/run/pihole-FTL.pid' "${CRAFT_PART_SRC}" | xargs -0 -r sed -i \
        -e "s|/var/run/pihole-FTL.pid|/etc/pihole/pihole-FTL.pid|g" \
        -e "s|/run/pihole-FTL.pid|/etc/pihole/pihole-FTL.pid|g"
      grep -rlZ '/run/dnsmasq.pid' "${CRAFT_PART_SRC}" | xargs -0 -r sed -i \
        -e "s|/var/run/dnsmasq.pid|/etc/pihole/dnsmasq.pid|g" \
        -e "s|/run/dnsmasq.pid|/etc/pihole/dnsmasq.pid|g"

      # Neutralize dnsmasq's attempt to drop supplementary groups.
      # In a strictly confined snap, daemons run as root without CAP_SETGID
      # by default. Since pihole-FTL passes `-u root` internally, dnsmasq
      # looks up the root group and tries to call setgroups(0) which fails with EPERM.
      sed -i 's/setgroups(0, \&dummy) == -1/0/g' src/dnsmasq/dnsmasq.c
      sed -i 's/setgid(gp->gr_gid) == -1/0/g' src/dnsmasq/dnsmasq.c

      # Suppress harmless chown_pihole warning in strictly confined snaps
      # where the pihole user does not exist. Daemons run as root anyway.
      sed -i 's/log_warn("chown_pihole(): Failed to get pihole user.*/return true;/g' src/files.c

      # Patch-rot guards. If upstream renames or rewords any of the targets
      # above, the sed silently no-ops and the build ships an unpatched
      # binary. Fail loudly so the next FTL bump is investigated.
      if ! grep -qF '#undef strstr' "${CRAFT_PART_SRC}/src/FTL.h"; then
        echo "ERROR: FTL.h strstr undef patch did not apply" >&2
        exit 1
      fi
      if ! grep -qF 'mbedtls_psa_get_random' "${CRAFT_PART_SRC}/src/webserver/x509.c"; then
        echo "ERROR: x509.c MbedTLS RNG patch did not apply" >&2
        exit 1
      fi
      if grep -rnF '/run/pihole-FTL.pid' "${CRAFT_PART_SRC}"; then
        echo "ERROR: PID redirect for pihole-FTL.pid missed a file" >&2
        exit 1
      fi
      if grep -rnF '/run/dnsmasq.pid' "${CRAFT_PART_SRC}"; then
        echo "ERROR: PID redirect for dnsmasq.pid missed a file" >&2
        exit 1
      fi
      if grep -nF 'setgroups(0, &dummy) == -1' "${CRAFT_PART_SRC}/src/dnsmasq/dnsmasq.c"; then
        echo "ERROR: dnsmasq setgroups neutralization did not apply" >&2
        exit 1
      fi
      if grep -nF 'setgid(gp->gr_gid) == -1' "${CRAFT_PART_SRC}/src/dnsmasq/dnsmasq.c"; then
        echo "ERROR: dnsmasq setgid neutralization did not apply" >&2
        exit 1
      fi
      if grep -nF 'log_warn("chown_pihole(): Failed to get pihole user' "${CRAFT_PART_SRC}/src/files.c"; then
        echo "ERROR: chown_pihole warning suppression did not apply" >&2
        exit 1
      fi
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DSTATIC=false
      - -DCMAKE_C_FLAGS="-Wno-error=discarded-qualifiers"
    build-environment:
      - GIT_HASH: "snap"
      - GIT_BRANCH: "snap"
    override-build: |
      # Single source of truth for the FTL version: the tag we just fetched.
      # No YAML interpolation, no drift with the heredoc-in-core, no
      # dependency on undocumented snapcraft variables.
      FTL_TAG=$(git -C "${CRAFT_PART_SRC}" describe --tags --always)
      export GIT_VERSION="${FTL_TAG}"
      export GIT_TAG="${FTL_TAG}"
      craftctl default
      # Publish the tag for the pi_hole part to consume via CRAFT_STAGE.
      # Excluded from the final snap by the `prime:` block below.
      mkdir -p "${CRAFT_PART_INSTALL}/snap-meta"
      printf '%s\n' "${FTL_TAG}" > "${CRAFT_PART_INSTALL}/snap-meta/ftl-tag"
    prime:
      - -snap-meta
    build-packages:
      # --- Build Tools & Utilities ---
      - build-essential
      - cmake
      - git
      - python3
      - xxd
      - bind9-dnsutils

      # --- Development Headers ---
      - libcap-dev
      - libgmp-dev
      - libidn2-dev
      - libmbedtls-dev
      - libreadline-dev
      - libsqlite3-dev
      - libssl-dev
      - libunistring-dev # added in FTL v6.6.x for Unicode handling
      - libuv1-dev

      # --- Nettle Stack ---
      - nettle-dev
      # Pulled dynamically by nettle-dev, but listed here to track
      # the Y2038 64-bit time_t transition on armhf for core26
      - libnettle8t64

    stage-packages:
      # --- Standalone Tools ---
      - bind9-dnsutils
      - jq

      # --- Web / Downloader Stack ---
      # curl is used by gravity.sh to download adlists. It is not present on
      # minimal Ubuntu installations (e.g. ubuntu:lts LXC images).
      - curl
      # HTTPS trust roots required by curl
      - ca-certificates

      # --- Core Libraries (Y2038 t64 transitions for core26) ---
      - libreadline8t64
      - libuv1t64
      - libnettle8t64

      # --- Core Libraries (Standard) ---
      - libcap2
      - libgmp10
      - libidn2-0
      - libsqlite3-0
      - libunistring5

      # --- MbedTLS Stack ---
      # mbedtls 3.6 SONAMEs on core26.
      - libmbedtls21
      # Explicitly defined transitive dependencies of libmbedtls21.
      # Listed explicitly so the link line is reproducible from this file alone.
      - libmbedcrypto16
      - libmbedx509-7

  # ---------------------------------------------------------------------
  # pi-hole core: the `pihole` CLI and supporting shell scripts.
  # Patched in-place to swap out `service`/`systemctl` calls for snapctl
  #  -  the rest of the path remapping is handled by the layout block.
  # ---------------------------------------------------------------------
  pi_hole:
    plugin: dump
    source: https://github.com/pi-hole/pi-hole.git
    source-type: git
    source-tag: v6.4.2
    source-depth: 1
    after: [ftl, web]
    override-pull: |
      craftctl default
      cd "${CRAFT_PART_SRC}"
      
      # 1. piholeLogFlush.sh stops/restarts the daemon via `service`; rewrite
      # to use snapctl so it works inside the sandbox.
      # Scoped to the current snap (no snap name prefix) to support renames.
      sed -i \
        -e 's|service pihole-FTL stop|snapctl stop pihole-ftl|g' \
        -e 's|service pihole-FTL restart|snapctl restart pihole-ftl|g' \
        -e 's|service pihole-FTL start|snapctl start pihole-ftl|g' \
        advanced/Scripts/piholeLogFlush.sh
      
      # 2. piholeDebug.sh checks FTL daemon status. Redirect systemctl is-active and service status to snapctl.
      # This handles both code paths gracefully inside confinement.
      sed -i 's|status_of_process=$(systemctl is-active "${i}")|status_of_process=$(snapctl is-active pihole-ftl \&>/dev/null \&\& echo "active" \|\| echo "inactive")|g' advanced/Scripts/piholeDebug.sh
      sed -i 's|if service "${i}" status |if snapctl is-active pihole-ftl \&>/dev/null; then true; elif false; |g' advanced/Scripts/piholeDebug.sh
      
      # 3. piholeDebug.sh full status check uses systemctl status. Divert to snapctl services.
      sed -i 's|FTL_status=$(systemctl status --full --no-pager pihole-FTL.service)|FTL_status=$(snapctl services pihole-ftl)|g' advanced/Scripts/piholeDebug.sh
      # And bypass the systemctl check block for FTL full status
      sed -i 's|log_write "${INFO} systemctl:  command not found"|FTL_status=$(snapctl services pihole-ftl); log_write "   ${FTL_status}"|g' advanced/Scripts/piholeDebug.sh

      # 4. Redirect PID files to /etc/pihole/ (layout-mounted to $SNAP_DATA/etc/pihole/)
      # which is visible to all snap commands and matches FTL's target path.
      # Handle /var/run/ before /run/ to avoid partial-match corruption.
      grep --exclude-dir=.git -rlZ '/run/pihole-FTL.pid' . | xargs -0 -r sed -i \
        -e 's|/var/run/pihole-FTL.pid|/etc/pihole/pihole-FTL.pid|g' \
        -e 's|/run/pihole-FTL.pid|/etc/pihole/pihole-FTL.pid|g'
        
      # 5. Strip readonly modifier from FTL_PID_FILE to prevent bash local variable scope collisions inside subshells
      grep --exclude-dir=.git -rlZ 'readonly FTL_PID_FILE' . | xargs -0 -r sed -i 's/readonly FTL_PID_FILE/FTL_PID_FILE/g'

      # 6. Neutralize upstream git version tracking checks inside strict confinement where git binary is stripped
      grep -rlZ 'git' advanced/Scripts/updatecheck.sh | xargs -0 -r sed -i 's|git |true # git disabled inside snap|g'

      # 7. Neuter chown commands since snap daemon runs as root and pihole user does not exist
      grep --exclude-dir=.git -rlZ 'chown pihole:pihole' . | xargs -0 -r sed -i 's|chown pihole:pihole|true # chown pihole:pihole|g'
      # Also catch chown user:pihole in debug log script
      sed -i 's|chown "$USER":"${username}" ${PIHOLE_DEBUG_LOG}|true # chown disabled inside snap|g' advanced/Scripts/piholeDebug.sh

      # Patch-rot guard. If upstream renames a file the sed -i would have
      # errored out and failed the build already; if upstream subtly
      # rewords one of the target strings, the sed silently no-ops and
      # the script ships broken. Fail loudly so we notice on the next
      # version bump.
      if grep -nF 'service pihole-FTL' advanced/Scripts/piholeLogFlush.sh; then
        echo "ERROR: piholeLogFlush.sh still references 'service pihole-FTL' after patch" >&2
        exit 1
      fi
      if grep --exclude-dir=.git -rnF '/run/pihole-FTL.pid' .; then
        echo "ERROR: PID redirect missed a file" >&2
        exit 1
      fi
      if grep -nF 'systemctl is-active "${i}"' advanced/Scripts/piholeDebug.sh; then
        echo "ERROR: piholeDebug.sh still references systemctl is-active for FTL" >&2
        exit 1
      fi
      if grep -nF 'systemctl status --full --no-pager' advanced/Scripts/piholeDebug.sh; then
        echo "ERROR: piholeDebug.sh still references systemctl status for FTL" >&2
        exit 1
      fi
    override-build: |
      FTL_TAG=$(cat "${CRAFT_STAGE}/snap-meta/ftl-tag")
      WEB_TAG=$(cat "${CRAFT_STAGE}/var/www/html/admin/snap-meta/web-tag")
      CORE_TAG=$(git -C "${CRAFT_PART_SRC}" describe --tags --always)

      # Snap version mirrors the upstream pi-hole/pi-hole tag, matching
      # what `pihole -v` reports for CORE_VERSION.
      craftctl set version="${CORE_TAG}"

      # Write the file directly to advanced/Scripts/ where the wildcard organizer will catch it cleanly
      mkdir -p "${CRAFT_PART_SRC}/advanced/Scripts/templates"
      cat > "${CRAFT_PART_SRC}/advanced/Scripts/templates/versions" <<EOF
      CORE_VERSION=${CORE_TAG}
      CORE_BRANCH=snap
      WEB_VERSION=${WEB_TAG}
      WEB_BRANCH=snap
      FTL_VERSION=${FTL_TAG}
      FTL_BRANCH=snap
      EOF

      craftctl default
      # Replicate the advanced/ directory structure to etc/.pihole/advanced
      # to satisfy gravity.sh which expects /etc/.pihole/advanced/Templates/ 
      # and /etc/.pihole/advanced/Scripts/database_migration/
      mkdir -p "${CRAFT_PART_INSTALL}/etc/.pihole"
      cp -R "${CRAFT_PART_SRC}/advanced" "${CRAFT_PART_INSTALL}/etc/.pihole/"

      # Workaround for core26 rust-coreutils AppArmor denial for `truncate` and `timeout`
      mkdir -p "${CRAFT_PART_INSTALL}/usr/bin"
      cp -L /usr/bin/truncate "${CRAFT_PART_INSTALL}/usr/bin/truncate"
      cp -L /usr/bin/timeout "${CRAFT_PART_INSTALL}/usr/bin/timeout"
    organize:
      pihole: opt/pihole/pihole
      gravity.sh: opt/pihole/gravity.sh
      # This single clean rule maps advanced/Scripts/ directly to /opt/pihole/, 
      # carrying your new templates/versions directory right along with it natively.
      advanced/Scripts/*: opt/pihole/
      manpages: usr/share/man-src
    stage:
      - opt/pihole
      - etc/.pihole
      - usr/share/man-src
      - usr/bin/truncate
      - usr/bin/timeout

  # ---------------------------------------------------------------------
  # Embedded web admin UI assets, served by FTL's civetweb instance.
  # ---------------------------------------------------------------------
  web:
    plugin: dump
    source: https://github.com/pi-hole/web.git
    source-type: git
    source-tag: v6.5
    source-depth: 1
    override-build: |
      # Capture the fetched tag for the pi_hole part to consume via CRAFT_STAGE.
      # The `organize: "*"` below moves snap-meta along with the upstream
      # docroot under var/www/html/admin/, so the consumer reads from
      # ${CRAFT_STAGE}/var/www/html/admin/snap-meta/web-tag. Excluded from
      # the final snap by the `prime:` block below.
      WEB_TAG=$(git -C "${CRAFT_PART_SRC}" describe --tags --always)
      craftctl default
      mkdir -p "${CRAFT_PART_INSTALL}/snap-meta"
      printf '%s\n' "${WEB_TAG}" > "${CRAFT_PART_INSTALL}/snap-meta/web-tag"
    organize:
      "*": var/www/html/admin/
    stage:
      - var/www/html
    # Drop upstream-repo housekeeping that has no business inside the
    # snap. Trims ~MB of bloat and shrinks the attack surface.
    prime:
      - -var/www/html/admin/snap-meta
      - -var/www/html/admin/.github
      - -var/www/html/admin/.gitignore
      - -var/www/html/admin/.gitattributes
      - -var/www/html/admin/.editorconfig
      - -var/www/html/admin/.eslintrc*
      - -var/www/html/admin/.stylelintrc*
      - -var/www/html/admin/test
      - -var/www/html/admin/tests
      - -var/www/html/admin/*.md
      - -var/www/html/admin/CONTRIBUTING*
      - -var/www/html/admin/CODE_OF_CONDUCT*
      - -var/www/html/admin/package.json
      - -var/www/html/admin/package-lock.json
      - -var/www/html/admin/composer.*
      - -var/www/html/admin/Gruntfile.js

  # ---------------------------------------------------------------------
  # Launcher scripts and hook helpers that live in this repo.
  # ---------------------------------------------------------------------
  wrappers:
    plugin: dump
    source: snap/local/
    source-type: local
    organize:
      launcher-ftl: bin/launcher-ftl
      launcher-pihole: bin/launcher-pihole
      check-system: bin/check-system
      snapdebug: bin/snapdebug
    stage:
      - bin/launcher-ftl
      - bin/launcher-pihole
      - bin/check-system
      - bin/snapdebug

apps:
  # The daemon. Disabled on install so the operator can free port 53 and
  # review interface connections before it starts.
  pihole-ftl:
    command: bin/launcher-ftl
    daemon: simple
    install-mode: disable
    restart-condition: on-failure
    # Keep the old FTL process running during `snap refresh` so DNS stays
    # up for all clients while snapd swaps in the new revision.  snapd
    # will send SIGTERM to the old process only after the new revision's
    # daemon has started successfully.  Without this, a mid-day refresh
    # drops DNS for every device on the network for several seconds.
    refresh-mode: endure
    # Give FTL time to flush its query DB and gravity state on shutdown.
    stop-timeout: 60s
    plugs:
      - network
      - network-bind
      - network-observe
      - system-observe
      - hardware-observe
      - mount-observe
      - network-control # required for DHCP server mode only
      - firewall-control # required for DHCP server mode only
      - process-control
      - time-control
      # FTL creates /dev/shm/FTL-<pid>-lock files for inter-process
      # coordination. The default AppArmor template denies arbitrary
      # writes under /dev/shm. `private: true` gives FTL its own
      # /dev/shm/snap.pihole/ namespace mapped transparently as /dev/shm.
      - shared-memory

  # The `pihole` CLI: `pihole status`, `pihole -g`, `pihole setpassword`, etc.
  # The launcher intercepts subcommands that don't make sense inside a
  # snap (self-update, repair, uninstall, checkout, updatechecker) and
  # prints the snap-native equivalent.
  pihole:
    command: bin/launcher-pihole
    aliases: [pihole]
    plugs:
      - network
      - network-bind
      - network-observe
      - system-observe
      - hardware-observe
      - mount-observe

  # Diagnostic tool to proactively detect and remediate port conflicts
  check-system:
    command: bin/check-system
    plugs:
      - network
      - network-bind

  # Explicit top-level convenience aliases
  status:
    command: bin/launcher-pihole status
    plugs:
      - network
      - network-bind
      - system-observe

  health:
    command: bin/check-system
    plugs:
      - network
      - network-bind

  snapdebug:
    command: bin/snapdebug
    plugs:
      - network
      - network-bind
      - system-observe
      - hardware-observe
      - mount-observe

  debug:
    command: bin/launcher-pihole -d
    plugs:
      - network
      - network-bind
      - system-observe
      - hardware-observe
      - mount-observe

  sqlite3:
    command: usr/bin/pihole-FTL sqlite3
    plugs:
      - network
      - network-bind

  # Automated gravity sync. Runs weekly. Users can customize the schedule using:
  # snap set pihole timer.gravity-sync.schedule="mon,02:00"
  gravity-sync:
    command: bin/launcher-pihole -g
    daemon: oneshot
    timer: sun,03:00~05:00
    plugs:
      - network
      - network-bind
      - network-observe
      - system-observe
      - hardware-observe
      - mount-observe

hooks:
  post-refresh:
    plugs:
      - network
      - network-bind
      - network-observe
      - system-observe
      - hardware-observe
      - mount-observe

# install only mkdir's directories (which the layout bind-mounts already
# grant write access to) and configure only calls snapctl + pihole-FTL.

plugs:
  # Private /dev/shm namespace for FTL. snapd creates
  # /dev/shm/snap.pihole/ on connect and bind-mounts it as /dev/shm
  # inside the snap's namespace, so FTL's hardcoded /dev/shm/FTL-*
  # paths "just work" without patching.
  shared-memory:
    private: true
