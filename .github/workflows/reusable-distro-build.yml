name: Reusable Distro Build

on:
  workflow_call:
    inputs:
      artifact_name:
        description: "Name to upload the built snap artifact under (consumed by reusable-distro-test.yml as snap_artifact_name)."
        required: false
        type: string
        default: built-snap
permissions:
  contents: read
jobs:
  build:
    name: Build Snap Package
    runs-on: ubuntu-24.04
    environment: snap-publishing
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build Snap
        uses: snapcore/action-build@v1
        id: snapcraft
        env:
          SNAPCRAFT_UA_TOKEN: ${{ secrets.PRO_TOKEN }}
        with:
          snapcraft-channel: 9.x/candidate

      - name: Upload Snap Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.artifact_name }}
          path: "*.snap"
