name: Edge Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SNAP_NAME: pihole-by-rajannpatel

jobs:
  lint:
    name: shellcheck + bats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck and bats
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats python3-yaml

      - name: shellcheck launchers and hooks
        run: |
          shellcheck \
            snap/local/launcher-ftl \
            snap/local/launcher-pihole \
            snap/hooks/install \
            snap/hooks/configure \
            snap/hooks/pre-refresh \
            snap/hooks/remove

      - name: bats unit tests
        run: bats tests/unit/

  build:
    name: build (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        # armhf, ppc64el, and s390x must be built via Launchpad or remote-build
        # because GitHub-hosted runners only support amd64 and arm64.
    steps:
      - uses: actions/checkout@v5

      - name: Build snap
        id: snapcraft
        uses: snapcore/action-build@v1
        with:
          # snapcraft 9.x supports every base from core18 onwards; aligning
          # the build and release workflows on the same channel keeps the
          # behaviour reproducible across them.
          snapcraft-channel: 9.x/candidate
          snapcraft-args: --build-for ${{ matrix.arch }}

      - name: Upload snap artefact
        uses: actions/upload-artifact@v4
        with:
          name: pihole-snap-${{ matrix.arch }}
          path: ${{ steps.snapcraft.outputs.snap }}
          if-no-files-found: error


  smoke:
    name: smoke test (${{ matrix.arch }})
    needs: [build, lint]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Download snap
        uses: actions/download-artifact@v4
        with:
          name: pihole-snap-${{ matrix.arch }}

      - name: Free port 53
        run: |
          sudo mkdir -p /etc/systemd/resolved.conf.d
          printf '[Resolve]\nDNSStubListener=no\n' \
            | sudo tee /etc/systemd/resolved.conf.d/pihole.conf
          sudo systemctl restart systemd-resolved

      - name: Install snap and connect plugs
        run: |
          # `snap refresh` only works once the snapd snap exists, which isn't
          # guaranteed on a fresh ubuntu-latest runner (only the apt package
          sudo apt-get install -y iproute2 dnsutils
          sudo snap install snapd --channel=latest/edge \
            || sudo snap refresh snapd --channel=latest/edge
          sudo snap install core26 --channel=latest/edge || true
          sudo snap install --dangerous ./${{ env.SNAP_NAME }}_*.snap
          
          # Explicitly connect network interfaces and required system plugs
          sudo snap connect ${{ env.SNAP_NAME }}:network-bind
          sudo snap connect ${{ env.SNAP_NAME }}:system-observe
          sudo snap connect ${{ env.SNAP_NAME }}:hardware-observe
          sudo snap connect ${{ env.SNAP_NAME }}:mount-observe
          sudo snap connect ${{ env.SNAP_NAME }}:network-control
          sudo snap connect ${{ env.SNAP_NAME }}:firewall-control
          
          # Private /dev/shm for FTL locks. --dangerous installs don't
          # always auto-connect; connecting explicitly is a no-op if
          # snapd already connected it.
          sudo snap connect ${{ env.SNAP_NAME }}:shared-memory || true
          sudo snap connect ${{ env.SNAP_NAME }}:network-observe || true

      - name: CLI sanity
        run: |
          sudo ${{ env.SNAP_NAME }}.pihole version

      - name: Blocked subcommand returns error and points at snap refresh
        run: |
          set +e
          out="$(sudo ${{ env.SNAP_NAME }}.pihole -up 2>&1)"
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
              echo "expected non-zero exit from 'pihole -up'" >&2
              exit 1
          fi
          echo "$out" | grep -q 'snap refresh pihole'

      - name: Start daemon and wait for DNS
        run: |
          sudo snap start --enable ${{ env.SNAP_NAME }}.pihole-ftl
          
          bound=0
          echo "Waiting for pihole-FTL to bind to port 53 and respond..."
          for i in $(seq 1 60); do
              echo "--- ss output at ${i}s ---"
              sudo ss -lnup | grep ':53' || true
              
              # Check port is bound AND resolver answers any query (even SERVFAIL
              # means FTL is alive; pi.hole may not resolve until fully booted).
              if sudo ss -lnup | grep -q ':53 ' && \
                 dig +short +time=1 +tries=1 @127.0.0.1 . NS 2>/dev/null | grep -q '.' ; then
                  echo "FTL bound to port 53 and verified active after ${i}s"
                  bound=1
                  break
              fi
              sleep 1
          done
          
          if [ "$bound" -eq 0 ]; then
              echo "::error::FTL failed to bind port 53 within 60 seconds" >&2
              sudo snap logs ${{ env.SNAP_NAME }}.pihole-ftl | tail -50 || true
              exit 1
          fi

          # =================================================================
          # NEW POST-START SANITY CHECK
          # =================================================================
          echo "Verifying live CLI status reporting..."
          sudo ${{ env.SNAP_NAME }}.pihole status

      - name: Resolve a name via FTL
        run: |
          dig +tries=2 +timeout=2 @127.0.0.1 example.com
          # exit non-zero if dig fails outright; an answer of any kind
          # (even NXDOMAIN before gravity is populated) proves FTL is alive.

      - name: snap set round-trip
        run: |
          sudo snap set ${{ env.SNAP_NAME }} ftl.webserver.port=8123
          # Configure hook runs after `snap set`; give it a moment to apply
          # and the daemon a moment to restart.
          sleep 5
          if ! sudo grep -E '8123' /var/snap/${{ env.SNAP_NAME }}/current/etc/pihole/pihole.toml; then
              echo "snap set did not propagate to pihole.toml" >&2
              sudo cat /var/snap/${{ env.SNAP_NAME }}/current/etc/pihole/pihole.toml || true
              exit 1
          fi

      - name: Web UI health check
        run: |
          echo "Testing embedded Civetweb HTTP server on port 8123..."
          # Fetch the dashboard and assert HTTP 200 OK.
          # The dashboard redirects /admin to /admin/, so we request /admin/ directly.
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8123/admin/")
          if [ "$HTTP_STATUS" -ne 200 ]; then
              echo "::error::Web UI health check failed! HTTP status: $HTTP_STATUS" >&2
              exit 1
          fi
          echo "Web UI is healthy."

      - name: Gravity update (pihole -g) runs cleanly under confinement
        run: |
          # Run a full gravity update and assert it exits 0. This exercises
          # network access from within strict confinement (fetching block lists)
          # and write access to the gravity database path under $SNAP_DATA.
          sudo ${{ env.SNAP_NAME }}.pihole -g
          # Confirm the gravity.db was written inside the snap data directory.
          if [ ! -f /var/snap/${{ env.SNAP_NAME }}/current/etc/pihole/gravity.db ]; then
              echo "gravity.db not found after 'pihole -g'" >&2
              exit 1
          fi
          echo "gravity.db size: $(du -h /var/snap/${{ env.SNAP_NAME }}/current/etc/pihole/gravity.db | cut -f1)"

      - name: Refresh and migration test
        run: |
          echo "Simulating an over-the-top snap refresh..."
          # Re-installing an existing local snap triggers the refresh pathway
          sudo snap install --dangerous ./${{ env.SNAP_NAME }}_*.snap
          
          echo "Verifying pre-refresh snapshot generation..."
          if ! sudo ls /var/snap/${{ env.SNAP_NAME }}/common/snapshots/pihole-backup-*.tar.gz >/dev/null 2>&1; then
              echo "::error::pre-refresh snapshot was not generated!" >&2
              exit 1
          fi
          
          echo "Verifying post-refresh data persistence..."
          if ! sudo grep -E '8123' /var/snap/${{ env.SNAP_NAME }}/current/etc/pihole/pihole.toml; then
              echo "::error::Data migration failed! web.port=8123 did not persist across refresh." >&2
              exit 1
          fi
          
          echo "Verifying daemon health after refresh..."
          sudo ${{ env.SNAP_NAME }}.pihole status
          dig +short +time=1 +tries=1 @127.0.0.1 . NS 2>/dev/null | grep -q '.'

      - name: Show recent daemon logs
        if: always()
        run: sudo snap logs ${{ env.SNAP_NAME }}.pihole-ftl | tail -100

      - name: Check for AppArmor denials
        if: always()
        run: |
          # ---------------------------------------------------------------------
          # AppArmor Verification Exceptions
          # ---------------------------------------------------------------------
          # This smoke test enforces strict zero-tolerance for unexpected AppArmor
          # denials to ensure confinement doesn't silently break core functionality.
          # However, certain utilities inherently probe for elevated capabilities 
          # that they do not strictly require for basic operation. We explicitly
          # filter these benign, non-fatal requests to prevent false test failures.
          #
          # EXCEPTION 1: dac_read_search & dac_override
          #   Context: Requested broadly by bash and common coreutils when scanning
          #            directories or reading files owned by root.
          #   Reason:  Non-fatal. The shell and utilities gracefully fall back to
          #            standard DAC permissions when denied.
          #
          # EXCEPTION 2: net_admin
          #   Context: Requested by `ss` (socket statistics) during `pihole status`.
          #   Reason:  Non-fatal. `ss` tries to drop into `net_admin` to fetch deep
          #            kernel packet queues and process-level socket ownership. When
          #            denied, it successfully falls back to standard unprivileged
          #            polling which is sufficient for `pihole status` to verify
          #            that port 53 is bound.
          # EXCEPTION 3: /etc/ldap/ldap.conf
          #   Context: curl probes this during SASL/LDAP plugin discovery on
          #            every invocation, even for plain HTTPS requests.
          #   Reason:  Non-fatal. curl gracefully continues without LDAP
          #            configuration; all HTTP/HTTPS downloads work normally.
          # ---------------------------------------------------------------------
          if sudo dmesg | grep -F 'apparmor="DENIED"' | grep 'snap.${{ env.SNAP_NAME }}' | grep -vE 'dac_read_search|dac_override|net_admin|ldap\.conf'; then
              echo "::error::AppArmor recorded fatal denials against the pihole snap (see above)"
              # Print the actual fatal errors to the log before exiting
              sudo dmesg | grep -F 'apparmor="DENIED"' | grep 'snap.${{ env.SNAP_NAME }}' | grep -vE 'dac_read_search|dac_override|net_admin|ldap\.conf'
              exit 1
          else
              echo "No fatal AppArmor denials recorded for snap.pihole."
          fi

      - name: Dump service status on failure
        if: failure()
        run: |
          sudo snap services ${{ env.SNAP_NAME }} || true
          sudo journalctl -u snap.${{ env.SNAP_NAME }}.pihole-ftl.service --no-pager | tail -200 || true
          echo "--- FTL.log ---"
          sudo cat /var/snap/${{ env.SNAP_NAME }}/common/var/log/pihole/FTL.log || true

  publish:
    name: publish to edge (${{ matrix.arch }})
    needs: [smoke]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - name: Download snap
        uses: actions/download-artifact@v4
        with:
          name: pihole-snap-${{ matrix.arch }}
          path: .

      - name: Get snap filename
        id: snap
        run: echo "file=$(ls ${{ env.SNAP_NAME }}_*.snap)" >> $GITHUB_OUTPUT

      - name: Publish to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snap.outputs.file }}
          release: latest/edge