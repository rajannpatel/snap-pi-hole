name: Track Upstream Releases
on:
  schedule:
    - cron: '0 */3 * * *' # Run every 3 hours
  workflow_dispatch: # Allow manual triggering

jobs:
  update-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup yq
        uses: dcarbone/install-yq-action@v1.1.1

      - name: Check for updates
        id: check_updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # Fetch latest tags and commits from GitHub API using authentication to avoid rate limits
          get_latest_tag() {
            curl -s -H "Authorization: Bearer $GITHUB_TOKEN" "https://api.github.com/repos/pi-hole/$1/releases/latest" | jq -r .tag_name
          }

          LATEST_FTL=$(get_latest_tag "FTL")
          LATEST_PIHOLE=$(get_latest_tag "pi-hole")
          LATEST_WEB=$(get_latest_tag "web")

          echo "Latest Stable FTL: $LATEST_FTL"
          echo "Latest Stable Pi-hole: $LATEST_PIHOLE"
          echo "Latest Stable Web: $LATEST_WEB"

          # Update main branch (Stable channel)
          CURRENT_FTL=$(yq '.parts.ftl.source-tag' snap/snapcraft.yaml)
          CURRENT_PIHOLE=$(yq '.parts.pi_hole.source-tag' snap/snapcraft.yaml)
          CURRENT_WEB=$(yq '.parts.web.source-tag' snap/snapcraft.yaml)

          echo "Current Stable FTL: $CURRENT_FTL"
          echo "Current Stable Pi-hole: $CURRENT_PIHOLE"
          echo "Current Stable Web: $CURRENT_WEB"

          UPDATED=false
          BODY_FILE=$(mktemp)
          echo "Automated PR to update upstream Pi-hole components." > "$BODY_FILE"
          echo "This action was triggered by the 3-hourly cron job detecting new releases." >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "### Component Updates" >> "$BODY_FILE"
          echo "| Component | Previous Tag | New Tag | Release Details |" >> "$BODY_FILE"
          echo "| :--- | :--- | :--- | :--- |" >> "$BODY_FILE"

          if [ "$LATEST_FTL" != "null" ] && [ "$LATEST_FTL" != "$CURRENT_FTL" ]; then
            yq -i ".parts.ftl.source-tag = \"$LATEST_FTL\"" snap/snapcraft.yaml
            UPDATED=true
            echo "| **FTL** | \`$CURRENT_FTL\` | \`$LATEST_FTL\` | [Release Notes](https://github.com/pi-hole/FTL/releases/tag/$LATEST_FTL) |" >> "$BODY_FILE"
          fi

          if [ "$LATEST_PIHOLE" != "null" ] && [ "$LATEST_PIHOLE" != "$CURRENT_PIHOLE" ]; then
            yq -i ".parts.pi_hole.source-tag = \"$LATEST_PIHOLE\"" snap/snapcraft.yaml
            UPDATED=true
            echo "| **pi-hole (core)** | \`$CURRENT_PIHOLE\` | \`$LATEST_PIHOLE\` | [Release Notes](https://github.com/pi-hole/pi-hole/releases/tag/$LATEST_PIHOLE) |" >> "$BODY_FILE"
          fi

          if [ "$LATEST_WEB" != "null" ] && [ "$LATEST_WEB" != "$CURRENT_WEB" ]; then
            yq -i ".parts.web.source-tag = \"$LATEST_WEB\"" snap/snapcraft.yaml
            UPDATED=true
            echo "| **web (admin)** | \`$CURRENT_WEB\` | \`$LATEST_WEB\` | [Release Notes](https://github.com/pi-hole/web/releases/tag/$LATEST_WEB) |" >> "$BODY_FILE"
          fi

          echo "" >> "$BODY_FILE"
          echo "_This PR was generated automatically by the Track Upstream Releases GitHub Action workflow._" >> "$BODY_FILE"

          echo "updated=$UPDATED" >> $GITHUB_OUTPUT

          {
            echo "pr_body<<EOF"
            cat "$BODY_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          rm -f "$BODY_FILE"

      - name: Create Pull Request
        if: steps.check_updates.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "chore: track upstream Pi-hole releases"
          title: "Track Upstream Pi-hole Components"
          body: ${{ steps.check_updates.outputs.pr_body }}
          branch: track-upstream-releases
          delete-branch: true
