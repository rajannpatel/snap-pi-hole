name: Track Upstream Sources
on:
  schedule:
    - cron: '0 */3 * * *' # Run every 3 hours
  workflow_dispatch: # Allow manual triggering

jobs:
  update-sources:
    runs-on: ubuntu-26.04
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup yq
        uses: dcarbone/install-yq-action@v1.1.1

      - name: Check for updates
        id: check_updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          get_latest_release_tag() {
            curl -fsSL -H "Authorization: Bearer $GITHUB_TOKEN" "https://api.github.com/repos/pi-hole/$1/releases/latest" | jq -r .tag_name
          }

          get_branch_commit() {
            curl -fsSL -H "Authorization: Bearer $GITHUB_TOKEN" "https://api.github.com/repos/pi-hole/$1/commits/master" | jq -r .sha
          }

          LATEST_FTL=$(get_latest_release_tag "FTL")
          LATEST_PIHOLE=$(get_latest_release_tag "pi-hole")
          LATEST_WEB=$(get_latest_release_tag "web")
          LATEST_FTL_COMMIT=$(get_branch_commit "FTL")
          LATEST_PIHOLE_COMMIT=$(get_branch_commit "pi-hole")
          LATEST_WEB_COMMIT=$(get_branch_commit "web")

          echo "Latest Stable FTL: $LATEST_FTL"
          echo "Latest Stable Pi-hole: $LATEST_PIHOLE"
          echo "Latest Stable Web: $LATEST_WEB"
          echo "Latest Stable FTL commit: $LATEST_FTL_COMMIT"
          echo "Latest Stable Pi-hole commit: $LATEST_PIHOLE_COMMIT"
          echo "Latest Stable Web commit: $LATEST_WEB_COMMIT"

          CURRENT_FTL=$(yq -r '.parts.ftl."source-commit"' snap/snapcraft.yaml)
          CURRENT_PIHOLE=$(yq -r '.parts.pi_hole."source-commit"' snap/snapcraft.yaml)
          CURRENT_WEB=$(yq -r '.parts.web."source-commit"' snap/snapcraft.yaml)

          echo "Current Stable FTL commit: $CURRENT_FTL"
          echo "Current Stable Pi-hole commit: $CURRENT_PIHOLE"
          echo "Current Stable Web commit: $CURRENT_WEB"

          UPDATED=false
          BODY_FILE=$(mktemp)
          echo "Automated PR to update upstream Pi-hole components." > "$BODY_FILE"
          echo "This action was triggered by the 3-hourly cron job detecting new commits on upstream stable branches." >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "### Component Updates" >> "$BODY_FILE"
          echo "| Component | Previous Commit | New Commit | Version Label | Details |" >> "$BODY_FILE"
          echo "| :--- | :--- | :--- | :--- | :--- |" >> "$BODY_FILE"

          if [ "$LATEST_FTL_COMMIT" != "null" ] && [ "$LATEST_FTL_COMMIT" != "$CURRENT_FTL" ]; then
            yq -i ".parts.ftl.\"source-commit\" = \"$LATEST_FTL_COMMIT\" | del(.parts.ftl.\"source-tag\") | del(.parts.ftl.\"source-branch\")" snap/snapcraft.yaml
            UPDATED=true
            echo "| **FTL** | \`${CURRENT_FTL:0:12}\` | \`${LATEST_FTL_COMMIT:0:12}\` | \`$LATEST_FTL\` | [Compare](https://github.com/pi-hole/FTL/compare/$CURRENT_FTL...master) |" >> "$BODY_FILE"
          fi

          if [ "$LATEST_PIHOLE_COMMIT" != "null" ] && [ "$LATEST_PIHOLE_COMMIT" != "$CURRENT_PIHOLE" ]; then
            yq -i ".parts.pi_hole.\"source-commit\" = \"$LATEST_PIHOLE_COMMIT\" | del(.parts.pi_hole.\"source-tag\") | del(.parts.pi_hole.\"source-branch\")" snap/snapcraft.yaml
            UPDATED=true
            echo "| **pi-hole (core)** | \`${CURRENT_PIHOLE:0:12}\` | \`${LATEST_PIHOLE_COMMIT:0:12}\` | \`$LATEST_PIHOLE\` | [Compare](https://github.com/pi-hole/pi-hole/compare/$CURRENT_PIHOLE...master) |" >> "$BODY_FILE"
          fi

          if [ "$LATEST_WEB_COMMIT" != "null" ] && [ "$LATEST_WEB_COMMIT" != "$CURRENT_WEB" ]; then
            yq -i ".parts.web.\"source-commit\" = \"$LATEST_WEB_COMMIT\" | del(.parts.web.\"source-tag\") | del(.parts.web.\"source-branch\")" snap/snapcraft.yaml
            UPDATED=true
            echo "| **web (admin)** | \`${CURRENT_WEB:0:12}\` | \`${LATEST_WEB_COMMIT:0:12}\` | \`$LATEST_WEB\` | [Compare](https://github.com/pi-hole/web/compare/$CURRENT_WEB...master) |" >> "$BODY_FILE"
          fi

          echo "" >> "$BODY_FILE"
          echo "_This PR was generated automatically by the Track Upstream Sources GitHub Action workflow._" >> "$BODY_FILE"

          echo "updated=$UPDATED" >> $GITHUB_OUTPUT

          {
            echo "pr_body<<EOF"
            cat "$BODY_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          rm -f "$BODY_FILE"

      - name: Create Pull Request
        if: steps.check_updates.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "chore: track upstream Pi-hole sources"
          title: "Track Upstream Pi-hole Sources"
          body: ${{ steps.check_updates.outputs.pr_body }}
          branch: track-upstream-sources
          delete-branch: true
