name: Canonical Documentation Style Checker

on: 
  pull_request:
    paths:
      - '**.md'
      - '**.txt'

jobs:
  vale:
    name: Style checker
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
      checks: write
      
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Checkout repo to runner
        uses: actions/checkout@v4

      - name: Install Canonical styles
        uses: canonical/documentation-style-guide@main

      - name: Run Vale tests
        uses: errata-ai/vale-action@reviewdog
        with:
          files: .
          fail_on_error: true