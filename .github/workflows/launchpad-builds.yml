name: Launchpad Builds

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref or SHA to build. Defaults to the selected branch.
        required: false
        type: string

env:
  SNAP_NAME: pihole-by-rajannpatel

jobs:
  preflight:
    name: launchpad preflight
    runs-on: ubuntu-26.04
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    permissions:
      actions: read
      contents: read
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}
    steps:
      - name: Check completed CI jobs
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOBS_URL: ${{ github.event.workflow_run.jobs_url }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          blocking=0
          page=1
          while :; do
            response="$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${JOBS_URL}?per_page=100&page=${page}")"

            count="$(jq '.jobs | length' <<< "$response")"
            [ "$count" -gt 0 ] || break

            while IFS=$'\t' read -r name conclusion; do
              case "$name" in
                "distro test "*|*" / distro-test")
                  echo "Ignoring distro-test result: ${name} (${conclusion})"
                  continue
                  ;;
              esac

              if [ "$conclusion" != "success" ]; then
                echo "::warning title=Launchpad preflight::Blocking Launchpad because CI job '${name}' concluded '${conclusion}'."
                blocking=1
              fi
            done < <(jq -r '.jobs[] | [.name, (.conclusion // "unknown")] | @tsv' <<< "$response")

            page=$((page + 1))
          done

          if [ "$blocking" -eq 0 ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-publish-launchpad:
    name: build and publish launchpad (${{ matrix.channel }}, ${{ matrix.arch }})
    needs: [preflight]
    runs-on: ubuntu-26.04
    environment: snap-publishing
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.preflight.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        arch: [armhf, ppc64el, riscv64, s390x]
        channel: [stable, edge]
    steps:
      # remote-build pushes the git tree to Launchpad and rejects shallow
      # clones, so a full-history checkout is mandatory here.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.ref || github.ref }}

      - name: Select upstream Pi-hole sources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 snap/local/build/select_snapcraft_upstream.py ${{ matrix.channel }}

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic --channel=9.x/stable

      - name: Restore Launchpad credentials
        env:
          LAUNCHPAD_CREDENTIALS: ${{ secrets.LAUNCHPAD_CREDENTIALS }}
        run: |
          if [ -z "${LAUNCHPAD_CREDENTIALS:-}" ]; then
            echo "::error title=Launchpad::LAUNCHPAD_CREDENTIALS secret is not set." >&2
            exit 1
          fi
          # snapcraft reads Launchpad OAuth credentials from this hardcoded path;
          # the secret holds the base64 of that file.
          install -d -m 700 ~/.local/share/snapcraft
          printf '%s' "${LAUNCHPAD_CREDENTIALS}" | base64 -d \
            > ~/.local/share/snapcraft/launchpad-credentials
          chmod 600 ~/.local/share/snapcraft/launchpad-credentials

      - name: Build ${{ matrix.arch }} on Launchpad
        run: |
          snapcraft remote-build \
            --build-for ${{ matrix.arch }} \
            --launchpad-accept-public-upload \
            --launchpad-timeout 18000

          # Verify that the snap file was downloaded
          if ! ls ${{ env.SNAP_NAME }}_*_${{ matrix.arch }}.snap 1>/dev/null 2>&1; then
            echo "::error title=Launchpad Build Failure::No snap file was downloaded. The remote build may have failed, timed out, or been stopped on Launchpad."
            exit 1
          fi

      - name: Generate SBOM (CycloneDX)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          SNAP_FILE=$(ls ${{ env.SNAP_NAME }}_*_${{ matrix.arch }}.snap | head -n1)
          rm -rf "extracted-${{ matrix.arch }}"
          unsquashfs -d "extracted-${{ matrix.arch }}" "$SNAP_FILE"
          syft scan "extracted-${{ matrix.arch }}" -o cyclonedx-json@1.5="sbom-${{ matrix.arch }}.json"
          python3 snap/local/build/enrich_sbom.py "sbom-${{ matrix.arch }}.json" "extracted-${{ matrix.arch }}"

      - name: Upload snap artifact
        uses: actions/upload-artifact@v6
        with:
          name: pihole-snap-launchpad-${{ matrix.channel }}-${{ matrix.arch }}
          path: ${{ env.SNAP_NAME }}_*_${{ matrix.arch }}.snap
          if-no-files-found: error

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v6
        with:
          name: sbom-launchpad-${{ matrix.channel }}-${{ matrix.arch }}
          path: sbom-${{ matrix.arch }}.json
          if-no-files-found: error

      - name: Get snap filename and release channel
        id: snap
        run: |
          SNAP_FILE=$(ls ${{ env.SNAP_NAME }}_*_${{ matrix.arch }}.snap | head -n1)
          echo "file=${SNAP_FILE}" >> $GITHUB_OUTPUT

          # Extract the version from the snap filename (e.g., pihole-by-rajannpatel_v6.6.2_armhf.snap -> v6.6.2)
          SNAP_VERSION=$(echo "$SNAP_FILE" | cut -d'_' -f2)

          # Strip leading 'v' if present and get the major version number (e.g., v6.6.2 -> 6)
          MAJOR_VERSION=$(echo "${SNAP_VERSION#v}" | cut -d'.' -f1)
          echo "track=${MAJOR_VERSION}" >> $GITHUB_OUTPUT

          if [ "${{ matrix.channel }}" = "edge" ]; then
            echo "channels=latest/edge" >> $GITHUB_OUTPUT
          else
            echo "channels=latest/stable" >> $GITHUB_OUTPUT
          fi

      - name: Publish to Snap Store
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          if [ -n "${SNAPCRAFT_STORE_CREDENTIALS:-}" ]; then
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                echo "::add-mask::$line"
              fi
            done <<< "${SNAPCRAFT_STORE_CREDENTIALS}"
          fi

          MAX_ATTEMPTS=3
          attempt=1
          success=0

          while [ $attempt -le $MAX_ATTEMPTS ]; do
            echo "Uploading snap (attempt $attempt of $MAX_ATTEMPTS)..."
            set +e
            UPLOAD_OUT=$(/snap/bin/snapcraft upload "${{ steps.snap.outputs.file }}" --release "${{ steps.snap.outputs.channels }}" 2>&1)
            RC=$?
            set -e

            if [ $RC -eq 0 ]; then
              echo "Upload succeeded."
              success=1
              break
            fi

            if echo "$UPLOAD_OUT" | grep -q "A file with this exact same content has already been uploaded"; then
              echo "::notice::Snap with the same content is already uploaded. Skipping duplicate upload."
              success=1
              break
            fi

            echo "::warning::Snapcraft upload attempt $attempt failed with exit code $RC. Retrying in 15 seconds..."
            attempt=$((attempt + 1))
            sleep 15
          done

          if [ $success -ne 1 ]; then
            echo "::error::Snapcraft upload failed after $MAX_ATTEMPTS attempts."
            exit $RC
          fi
