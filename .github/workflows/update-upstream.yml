name: Check Upstream Updates

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual triggering from the UI

jobs:
  check-updates:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch latest release tags
        id: fetch-tags
        run: |
          FTL_LATEST=$(curl -s https://api.github.com/repos/pi-hole/FTL/releases/latest | jq -r .tag_name)
          PIHOLE_LATEST=$(curl -s https://api.github.com/repos/pi-hole/pi-hole/releases/latest | jq -r .tag_name)
          WEB_LATEST=$(curl -s https://api.github.com/repos/pi-hole/web/releases/latest | jq -r .tag_name)
          
          # Basic validation
          if [[ -z "$FTL_LATEST" || "$FTL_LATEST" == "null" ]]; then echo "Failed to fetch FTL tag" && exit 1; fi
          if [[ -z "$PIHOLE_LATEST" || "$PIHOLE_LATEST" == "null" ]]; then echo "Failed to fetch pi-hole tag" && exit 1; fi
          if [[ -z "$WEB_LATEST" || "$WEB_LATEST" == "null" ]]; then echo "Failed to fetch web tag" && exit 1; fi

          echo "ftl_latest=$FTL_LATEST" >> $GITHUB_OUTPUT
          echo "pihole_latest=$PIHOLE_LATEST" >> $GITHUB_OUTPUT
          echo "web_latest=$WEB_LATEST" >> $GITHUB_OUTPUT

      - name: Update snapcraft.yaml and README.md
        run: |
          FTL_LATEST="${{ steps.fetch-tags.outputs.ftl_latest }}"
          PIHOLE_LATEST="${{ steps.fetch-tags.outputs.pihole_latest }}"
          WEB_LATEST="${{ steps.fetch-tags.outputs.web_latest }}"

          # Update snapcraft.yaml. Using sed targeting specific parts.
          # Part 1: ftl
          sed -i "/^  ftl:/,/^    source-tag:/ s/^    source-tag: .*/    source-tag: ${FTL_LATEST}/" snap/snapcraft.yaml
          
          # Part 2: pi_hole
          sed -i "/^  pi_hole:/,/^    source-tag:/ s/^    source-tag: .*/    source-tag: ${PIHOLE_LATEST}/" snap/snapcraft.yaml

          # Part 3: web
          sed -i "/^  web:/,/^    source-tag:/ s/^    source-tag: .*/    source-tag: ${WEB_LATEST}/" snap/snapcraft.yaml

          # Update the version table in README.md.
          # Python is used instead of sed because [FTL] in ERE is a character
          # class (matching F, T, or L), which would cause all three rows to
          # match the same pattern. Anchoring on the unique GitHub URL path
          # per component (/FTL, /pi-hole, /web) makes each substitution exact.
          python3 - "$FTL_LATEST" "$PIHOLE_LATEST" "$WEB_LATEST" <<'PYEOF'
          import re, sys
          ftl_ver, pihole_ver, web_ver = sys.argv[1:]
          with open('README.md') as f:
              content = f.read()
          content = re.sub(r'(github\.com/pi-hole/FTL\)[*| "]+\| )v[\d.]+', rf'\g<1>{ftl_ver}', content)
          content = re.sub(r'(github\.com/pi-hole/pi-hole\)[*| "]+\| )v[\d.]+', rf'\g<1>{pihole_ver}', content)
          content = re.sub(r'(github\.com/pi-hole/web\)[*| "]+\| )v[\d.]+', rf'\g<1>{web_ver}', content)
          with open('README.md', 'w') as f:
              f.write(content)
          PYEOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update upstream Pi-hole components"
          title: "Update upstream Pi-hole components to latest releases"
          body: |
            This PR automatically bumps the upstream Pi-hole components to their latest tags.
            
            - **FTL**: `${{ steps.fetch-tags.outputs.ftl_latest }}`
            - **pi-hole (core)**: `${{ steps.fetch-tags.outputs.pihole_latest }}`
            - **web**: `${{ steps.fetch-tags.outputs.web_latest }}`
            
            _This PR was generated automatically by a GitHub Action._
          branch: auto-update-upstream
          base: main