name: Promote Pipeline

on:
  workflow_dispatch:
    inputs:
      revision:
        description: 'Snap revision to promote'
        required: true
      source_channel:
        description: 'Current tested channel containing this revision (e.g., latest/edge, latest/beta)'
        required: true
        default: 'latest/edge'
      target_channel:
        description: 'Target channel (e.g., latest/candidate, latest/stable)'
        required: true
        default: 'latest/candidate'
      validation_run_id:
        description: 'Successful GitHub Actions run ID that tested this revision'
        required: true
      confirmation:
        description: 'Type exactly: promote <revision> from <source_channel> to <target_channel>'
        required: true

env:
  SNAP_NAME: pihole-by-rajannpatel

jobs:
  promote:
    name: promote snap revision
    runs-on: ubuntu-latest
    environment: snap-publishing
    permissions:
      actions: read
      contents: read
    steps:
      - name: Validate promotion request
        env:
          REVISION: ${{ github.event.inputs.revision }}
          SOURCE_CHANNEL: ${{ github.event.inputs.source_channel }}
          TARGET_CHANNEL: ${{ github.event.inputs.target_channel }}
          CONFIRMATION: ${{ github.event.inputs.confirmation }}
        run: |
          set -euo pipefail

          channel_re='^([A-Za-z0-9][A-Za-z0-9-]*/)?(stable|candidate|beta|edge)(/[A-Za-z0-9][A-Za-z0-9._-]*)?$'
          if ! [[ "$REVISION" =~ ^[0-9]+$ ]]; then
            echo "::error::revision must be a numeric Snap Store revision."
            exit 1
          fi
          if ! [[ "$SOURCE_CHANNEL" =~ $channel_re ]]; then
            echo "::error::source_channel must use Snap channel syntax: [track/]risk[/branch]."
            exit 1
          fi
          if ! [[ "$TARGET_CHANNEL" =~ $channel_re ]]; then
            echo "::error::target_channel must use Snap channel syntax: [track/]risk[/branch]."
            exit 1
          fi
          if [ "$SOURCE_CHANNEL" = "$TARGET_CHANNEL" ]; then
            echo "::error::source_channel and target_channel must differ."
            exit 1
          fi

          expected="promote ${REVISION} from ${SOURCE_CHANNEL} to ${TARGET_CHANNEL}"
          if [ "$CONFIRMATION" != "$expected" ]; then
            echo "::error::confirmation must exactly match: ${expected}"
            exit 1
          fi

      - name: Verify validation workflow succeeded
        env:
          GH_TOKEN: ${{ github.token }}
          VALIDATION_RUN_ID: ${{ github.event.inputs.validation_run_id }}
        run: |
          set -euo pipefail

          status="$(gh run view "$VALIDATION_RUN_ID" --repo "$GITHUB_REPOSITORY" --json status --jq .status)"
          conclusion="$(gh run view "$VALIDATION_RUN_ID" --repo "$GITHUB_REPOSITORY" --json conclusion --jq .conclusion)"
          url="$(gh run view "$VALIDATION_RUN_ID" --repo "$GITHUB_REPOSITORY" --json url --jq .url)"

          if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
            echo "::error::validation run ${VALIDATION_RUN_ID} is not a successful completed run (status=${status}, conclusion=${conclusion})."
            echo "Run URL: ${url}"
            exit 1
          fi

          echo "Validated successful workflow run: ${url}"

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Verify revision exists and source channel is installable
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          REVISION: ${{ github.event.inputs.revision }}
          SOURCE_CHANNEL: ${{ github.event.inputs.source_channel }}
        run: |
          set -euo pipefail

          echo "Current Store channel map:"
          snapcraft status "${SNAP_NAME}"

          if ! snapcraft list-revisions "${SNAP_NAME}" > revisions.txt; then
            snapcraft revisions "${SNAP_NAME}" > revisions.txt
          fi
          if ! awk -v rev="$REVISION" '{ for (i = 1; i <= NF; i++) if ($i == rev) found = 1 } END { exit found ? 0 : 1 }' revisions.txt; then
            echo "::error::revision ${REVISION} was not found in Snap Store revisions for ${SNAP_NAME}."
            cat revisions.txt
            exit 1
          fi

          sudo snap install "${SNAP_NAME}" --channel "$SOURCE_CHANNEL"
          installed_revision="$(snap list "${SNAP_NAME}" | awk 'NR == 2 { print $3 }')"
          if [ "$installed_revision" != "$REVISION" ]; then
            echo "::error::${SOURCE_CHANNEL} installs revision ${installed_revision}, not requested revision ${REVISION}."
            exit 1
          fi

          sudo snap run "${SNAP_NAME}.pihole" version
          sudo snap remove "${SNAP_NAME}"

      - name: Promote Revision
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          REVISION: ${{ github.event.inputs.revision }}
          TARGET_CHANNEL: ${{ github.event.inputs.target_channel }}
        run: |
          set -euo pipefail
          snapcraft release "${SNAP_NAME}" "$REVISION" "$TARGET_CHANNEL"
          snapcraft status "${SNAP_NAME}"
