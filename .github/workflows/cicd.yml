name: CI/CD Pipeline

# Note: On success, this workflow triggers the post-publish Channel Switch Smoke check (channel-switch.yml)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SNAP_NAME: pihole-by-rajannpatel

jobs:
  lint:
    name: shellcheck + bats
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck, bats, yamllint, and kcov
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats python3-yaml yamllint

          if sudo apt-get install -y kcov; then
            kcov --version
          else
            echo "kcov is not available from apt on this runner; building from source."
            sudo apt-get install -y \
              build-essential \
              cmake \
              git \
              libcurl4-openssl-dev \
              libdw-dev \
              libelf-dev \
              libiberty-dev \
              libssl-dev \
              pkg-config \
              zlib1g-dev

            tmpdir="$(mktemp -d)"
            trap 'rm -rf "${tmpdir}"' EXIT

            git clone --depth 1 --branch v43 https://github.com/SimonKagstrom/kcov.git "${tmpdir}/kcov"
            cmake -S "${tmpdir}/kcov" -B "${tmpdir}/kcov/build" -DCMAKE_BUILD_TYPE=Release
            cmake --build "${tmpdir}/kcov/build" --parallel "$(nproc)"
            sudo cmake --install "${tmpdir}/kcov/build"
            kcov --version
          fi

      - name: shellcheck launchers and hooks
        run: |
          shellcheck -x \
            snap/local/runtime/launcher-ftl.sh \
            snap/local/runtime/launcher-pihole.sh \
            snap/local/runtime/config-sync.sh \
            snap/local/runtime/pihole-config.sh \
            snap/local/testing/snap-check.sh \
            snap/local/testing/snap-debug.sh \
            snap/local/testing/snap-setup.sh \
            snap/local/build/ftl-override-build.sh \
            snap/local/build/ftl-override-pull.sh \
            snap/local/build/pi-hole-override-build.sh \
            snap/local/build/pi-hole-override-pull.sh \
            snap/local/build/web-override-build.sh \
            snap/hooks/install \
            snap/hooks/configure \
            snap/hooks/pre-refresh \
            snap/hooks/post-refresh \
            snap/hooks/remove

      - name: yamllint snapcraft.yaml
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" snap/snapcraft.yaml

      - name: bats unit tests (with coverage)
        run: |
          mkdir -p coverage
          kcov --include-path=$PWD/snap/local,$PWD/snap/hooks $PWD/coverage bats tests/unit/

      - name: Upload code coverage report
        uses: actions/upload-artifact@v6
        with:
          name: code-coverage-report
          path: coverage/

      - name: bats integration tests
        run: bats tests/integration/

  build:
    name: build github (${{ matrix.channel }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-26.04-arm' || 'ubuntu-26.04' }}
    environment: snap-publishing
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        channel: [stable, edge]
        # armhf, ppc64el, riscv64, and s390x are built on Launchpad's build farm
        # by the separate Launchpad Builds workflow, because GitHub-hosted runners
        # only support amd64 and arm64.
    steps:
      - uses: actions/checkout@v6

      - name: Select upstream Pi-hole sources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 snap/local/build/select_snapcraft_upstream.py ${{ matrix.channel }}

      - name: Mask Snapcraft UA token
        env:
          SNAPCRAFT_UA_TOKEN: ${{ secrets.PRO_TOKEN }}
        run: |
          if [ -n "${SNAPCRAFT_UA_TOKEN:-}" ]; then
            echo "::add-mask::${SNAPCRAFT_UA_TOKEN}"
          fi

      - name: Build snap
        id: snapcraft
        uses: snapcore/action-build@v1
        env:
          SNAPCRAFT_UA_TOKEN: ${{ secrets.PRO_TOKEN }}
        with:
          snapcraft-channel: 9.x/stable
          snapcraft-args: --build-for ${{ matrix.arch }}

      - name: Generate SBOM (CycloneDX)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          unsquashfs -d extracted-snap ${{ steps.snapcraft.outputs.snap }}
          syft scan extracted-snap -o cyclonedx-json=sbom-${{ matrix.channel }}-${{ matrix.arch }}.json
          python3 snap/local/build/enrich_sbom.py sbom-${{ matrix.channel }}-${{ matrix.arch }}.json extracted-snap

      - name: Upload SBOM artefact
        uses: actions/upload-artifact@v6
        with:
          name: sbom-github-${{ matrix.channel }}-${{ matrix.arch }}
          path: sbom-${{ matrix.channel }}-${{ matrix.arch }}.json
          if-no-files-found: error

      - name: Upload snap artefact
        uses: actions/upload-artifact@v6
        with:
          name: pihole-snap-github-${{ matrix.channel }}-${{ matrix.arch }}
          path: ${{ steps.snapcraft.outputs.snap }}
          if-no-files-found: error

  vulnerability-scan:
    name: vulnerability scan
    needs: [build]
    # Scan the SBOMs produced by the GitHub builders. Launchpad architectures
    # are built and published by a separate workflow so slow remote-build queues
    # cannot block the amd64/arm64 security gate or dashboard deploy.
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-26.04
    environment: snap-publishing
    permissions:
      contents: read
      models: read
    env:
      LLM_API_BASE_URL: ${{ vars.LLM_API_BASE_URL || 'https://models.github.ai/inference' }}
      LLM_MAX_ATTEMPTS: 5
      LLM_RETRY_BASE_DELAY_SECONDS: 2.0
    steps:
      - uses: actions/checkout@v6

      - name: Restore/Save LLM Cache
        uses: actions/cache@v4
        with:
          path: local-vulnerabilities/llm-cache.json
          key: llm-cache-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            llm-cache-

      - name: Initialize LLM cache file
        run: |
          mkdir -p local-vulnerabilities
          if [ ! -f local-vulnerabilities/llm-cache.json ]; then
            printf '{}\n' > local-vulnerabilities/llm-cache.json
          fi

      - name: Download SBOMs
        uses: actions/download-artifact@v7
        with:
          pattern: sbom-*
          path: sbom-input
          merge-multiple: true

      - name: Install OSV-Scanner
        run: |
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.3.8
          echo "${HOME}/go/bin" >> "$GITHUB_PATH"

      - name: Validate LLM API key
        env:
          LLM_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_GITHUB_KEY: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${LLM_GEMINI_KEY:-}" ]; then
            echo "::add-mask::${LLM_GEMINI_KEY}"
          fi
          if [ -n "${LLM_GITHUB_KEY:-}" ]; then
            echo "::add-mask::${LLM_GITHUB_KEY}"
          fi
          python3 snap/local/build/validate_llm_key.py

      - name: Scan SBOMs with OSV-Scanner
        env:
          LLM_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_GITHUB_KEY: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${LLM_GEMINI_KEY:-}" ]; then
            echo "::add-mask::${LLM_GEMINI_KEY}"
          fi
          if [ -n "${LLM_GITHUB_KEY:-}" ]; then
            echo "::add-mask::${LLM_GITHUB_KEY}"
          fi
          if [ -z "${LLM_GEMINI_KEY:-}" ] && [ -z "${LLM_GITHUB_KEY:-}" ]; then
            echo "::notice title=LLM analysis::No LLM API keys are available. Using cached or fallback confinement explanations."
          fi

          mkdir -p osv-sbom-input vulnerability-reports
          scanner_error=0

          for sbom in sbom-input/sbom-*.json; do
            arch="${sbom##*/sbom-}"
            arch="${arch%.json}"
            scan_input="osv-sbom-input/sbom-${arch}.cdx.json"
            report="vulnerability-reports/osv-${arch}.json"

            cp "$sbom" "$scan_input"
            echo "Scanning $scan_input..."

            set +e
            osv-scanner scan --format json -L "$scan_input" --output-file "$report"
            rc=$?
            set -e

            case "$rc" in
              0)
                echo "::notice title=OSV-Scanner::No known vulnerabilities found in ${arch} SBOM."
                ;;
              1)
                echo "::warning title=OSV-Scanner::Known vulnerabilities found in ${arch} SBOM. See uploaded reports."
                ;;
              *)
                echo "::error title=OSV-Scanner::Scan failed for ${arch} SBOM with exit code ${rc}."
                scanner_error=1
                ;;
            esac
          done

          python3 snap/local/build/summarize_osv_reports.py vulnerability-reports

          if [ "$scanner_error" -ne 0 ]; then
            exit 1
          fi

      - name: Upload vulnerability reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: vulnerability-reports
          path: vulnerability-reports/
          if-no-files-found: error


  smoke:
    name: smoke test (${{ matrix.channel }}, ${{ matrix.arch }})
    needs: [build, lint]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-26.04-arm' || 'ubuntu-26.04' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        channel: [stable, edge]
    steps:
      - name: Download snap
        uses: actions/download-artifact@v7
        with:
          name: pihole-snap-github-${{ matrix.channel }}-${{ matrix.arch }}

      - name: Free port 53
        run: |
          sudo mkdir -p /etc/systemd/resolved.conf.d
          printf '[Resolve]\nDNSStubListener=no\n' \
            | sudo tee /etc/systemd/resolved.conf.d/pihole.conf
          sudo systemctl restart systemd-resolved

      - name: Install snap and connect plugs
        run: |
          # `snap refresh` only works once the snapd snap exists, which isn't
          # guaranteed on a fresh ubuntu-26.04 runner (only the apt package
          sudo apt-get install -y iproute2 dnsutils
          sudo snap install snapd \
            || sudo snap refresh snapd
          sudo snap install core26 || true
          sudo snap install --dangerous ./${{ env.SNAP_NAME }}_*.snap

          # Explicitly connect network interfaces and required system plugs
          sudo snap connect ${{ env.SNAP_NAME }}:network-bind
          sudo snap connect ${{ env.SNAP_NAME }}:system-observe
          sudo snap connect ${{ env.SNAP_NAME }}:hardware-observe
          sudo snap connect ${{ env.SNAP_NAME }}:mount-observe
          sudo snap connect ${{ env.SNAP_NAME }}:network-control
          sudo snap connect ${{ env.SNAP_NAME }}:firewall-control

          # Private /dev/shm for FTL locks. --dangerous installs don't
          # always auto-connect; connecting explicitly is a no-op if
          # snapd already connected it.
          sudo snap connect ${{ env.SNAP_NAME }}:shared-memory || true
          sudo snap connect ${{ env.SNAP_NAME }}:network-observe || true

      - name: CLI sanity
        run: |
          sudo ${{ env.SNAP_NAME }}.pihole version

      - name: Blocked subcommand returns error and points at snap refresh
        run: |
          set +e
          out="$(sudo ${{ env.SNAP_NAME }}.pihole -up 2>&1)"
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
              echo "expected non-zero exit from 'pihole -up'" >&2
              exit 1
          fi
          echo "$out" | grep -q 'snap refresh pihole'

      - name: Start daemon and wait for DNS
        run: |
          sudo snap start --enable ${{ env.SNAP_NAME }}.pihole-ftl

          bound=0
          echo "Waiting for pihole-FTL to bind to port 53 and respond..."
          for i in $(seq 1 60); do
              echo "--- ss output at ${i}s ---"
              sudo ss -lnup | grep ':53' || true

              # Check port is bound AND resolver answers any query (even SERVFAIL
              # means FTL is alive; pi.hole may not resolve until fully booted).
              if sudo ss -lnup | grep -q ':53 ' && \
                 dig +short +time=1 +tries=1 @127.0.0.1 . NS 2>/dev/null | grep -q '.' ; then
                  echo "FTL bound to port 53 and verified active after ${i}s"
                  bound=1
                  break
              fi
              sleep 1
          done

          if [ "$bound" -eq 0 ]; then
              echo "::error::FTL failed to bind port 53 within 60 seconds" >&2
              sudo snap logs ${{ env.SNAP_NAME }}.pihole-ftl | tail -50 || true
              exit 1
          fi

          # Post-start sanity check.
          echo "Verifying live CLI status reporting..."
          sudo ${{ env.SNAP_NAME }}.pihole status

      - name: Resolve a name via FTL
        run: |
          dig +tries=2 +timeout=2 @127.0.0.1 example.com
          # exit non-zero if dig fails outright; an answer of any kind
          # (even NXDOMAIN before gravity is populated) proves FTL is alive.

      - name: snap set round-trip
        run: |
          sudo snap set ${{ env.SNAP_NAME }} ftl.webserver.port=8123
          # Configure hook runs after `snap set`; give it a moment to apply
          # and the daemon a moment to restart.
          sleep 5
          if ! sudo grep -E '8123' /var/snap/${{ env.SNAP_NAME }}/current/etc/pihole/pihole.toml; then
              echo "snap set did not propagate to pihole.toml" >&2
              sudo cat /var/snap/${{ env.SNAP_NAME }}/current/etc/pihole/pihole.toml || true
              exit 1
          fi

      - name: Web UI health check
        run: |
          echo "Testing embedded Civetweb HTTP server on port 8123..."
          # Fetch the dashboard and assert HTTP 200 OK.
          # The dashboard redirects /admin to /admin/, so we request /admin/ directly.
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8123/admin/")
          if [ "$HTTP_STATUS" -ne 200 ]; then
              echo "::error::Web UI health check failed! HTTP status: $HTTP_STATUS" >&2
              exit 1
          fi
          echo "Web UI is healthy."

      - name: Gravity update (pihole -g) runs cleanly under confinement
        run: |
          # Run a full gravity update and assert it exits 0. This exercises
          # network access from within strict confinement (fetching block lists)
          # and write access to the gravity database path under $SNAP_DATA.
          sudo ${{ env.SNAP_NAME }}.pihole -g
          # Confirm the gravity.db was written inside the snap data directory.
          if [ ! -f /var/snap/${{ env.SNAP_NAME }}/current/etc/pihole/gravity.db ]; then
              echo "gravity.db not found after 'pihole -g'" >&2
              exit 1
          fi
          echo "gravity.db size: $(du -h /var/snap/${{ env.SNAP_NAME }}/current/etc/pihole/gravity.db | cut -f1)"

      - name: Refresh and migration test
        run: |
          echo "Simulating an over-the-top snap refresh..."
          # Re-installing an existing local snap triggers the refresh pathway
          sudo snap install --dangerous ./${{ env.SNAP_NAME }}_*.snap

          echo "Verifying pre-refresh snapshot generation..."
          if ! sudo ls /var/snap/${{ env.SNAP_NAME }}/common/snapshots/pihole-backup-*.tar.gz >/dev/null 2>&1; then
              echo "::error::pre-refresh snapshot was not generated!" >&2
              exit 1
          fi

          echo "Verifying post-refresh data persistence..."
          if ! sudo grep -E '8123' /var/snap/${{ env.SNAP_NAME }}/current/etc/pihole/pihole.toml; then
              echo "::error::Data migration failed! web.port=8123 did not persist across refresh." >&2
              exit 1
          fi

          echo "Verifying daemon health after refresh..."
          sudo ${{ env.SNAP_NAME }}.pihole status
          dig +short +time=1 +tries=1 @127.0.0.1 . NS 2>/dev/null | grep -q '.'

      - name: Show recent daemon logs
        if: always()
        run: sudo snap logs ${{ env.SNAP_NAME }}.pihole-ftl | tail -100

      - name: Check for AppArmor denials
        if: always()
        run: |
          # AppArmor Verification Exceptions
          # This smoke test enforces strict zero-tolerance for unexpected AppArmor
          # denials to ensure confinement doesn't silently break core functionality.
          # However, certain utilities inherently probe for elevated capabilities
          # that they do not strictly require for basic operation. We explicitly
          # filter these benign, non-fatal requests to prevent false test failures.
          #
          # EXCEPTION 1: dac_read_search & dac_override
          #   Context: Requested broadly by bash and common coreutils when scanning
          #            directories or reading files owned by root.
          #   Reason:  Non-fatal. The shell and utilities gracefully fall back to
          #            standard DAC permissions when denied.
          #
          # EXCEPTION 2: net_admin
          #   Context: Requested by `ss` (socket statistics) during `pihole status`.
          #   Reason:  Non-fatal. `ss` tries to drop into `net_admin` to fetch deep
          #            kernel packet queues and process-level socket ownership. When
          #            denied, it successfully falls back to standard unprivileged
          #            polling which is sufficient for `pihole status` to verify
          #            that port 53 is bound.
          # EXCEPTION 3: /etc/ldap/ldap.conf
          #   Context: curl probes this during SASL/LDAP plugin discovery on
          #            every invocation, even for plain HTTPS requests.
          #   Reason:  Non-fatal. curl gracefully continues without LDAP
          #            configuration; all HTTP/HTTPS downloads work normally.
          #
          # EXCEPTION 4: cpu.max (cgroup limits)
          #   Context: snap-exec and snapctl query cgroup CPU limits.
          #   Reason:  Non-fatal cgroup resource query.
          #
          # EXCEPTION 5: mountinfo
          #   Context: snapctl and snap-exec query mount information from /proc/self/mountinfo.
          #   Reason:  Non-fatal mount lookup.
          if sudo dmesg | grep -F 'apparmor="DENIED"' | grep 'snap.${{ env.SNAP_NAME }}' | grep -vE 'dac_read_search|dac_override|net_admin|ldap\.conf|name="/sys/fs/cgroup/system\.slice/snap\.[a-zA-Z0-9.-]+\.(scope|service)/cpu\.max".*comm="(snap-exec|snapctl)"|name="/proc/[0-9]+/mountinfo".*comm="(snap-exec|snapctl)"'; then
              echo "::error::AppArmor recorded fatal denials against the pihole snap (see above)"
              # Print the actual fatal errors to the log before exiting
              sudo dmesg | grep -F 'apparmor="DENIED"' | grep 'snap.${{ env.SNAP_NAME }}' | grep -vE 'dac_read_search|dac_override|net_admin|ldap\.conf|name="/sys/fs/cgroup/system\.slice/snap\.[a-zA-Z0-9.-]+\.(scope|service)/cpu\.max".*comm="(snap-exec|snapctl)"|name="/proc/[0-9]+/mountinfo".*comm="(snap-exec|snapctl)"'
              exit 1
          else
              echo "No fatal AppArmor denials recorded for snap.pihole."
          fi

      - name: Dump service status on failure
        if: failure()
        run: |
          sudo snap services ${{ env.SNAP_NAME }} || true
          sudo journalctl -u snap.${{ env.SNAP_NAME }}.pihole-ftl.service --no-pager | tail -200 || true
          echo "--- FTL.log ---"
          sudo cat /var/snap/${{ env.SNAP_NAME }}/common/var/log/pihole/FTL.log || true

  distro-test:
    name: distro test (${{ matrix.distro }}, ${{ matrix.channel }})
    needs: [build, lint]
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            lxd_image: ubuntu:lts
            channel: stable
          - distro: ubuntu-daily
            lxd_image: ubuntu-daily:devel
            channel: stable
          - distro: ubuntu-core
            lxd_image: ""
            channel: stable
          - distro: debian
            lxd_image: images:debian
            channel: stable
          - distro: debian-stable
            lxd_image: images:debian/stable
            channel: stable
          - distro: fedora
            lxd_image: images:fedora
            channel: stable
          - distro: rockylinux
            lxd_image: images:rockylinux
            channel: stable
          - distro: almalinux
            lxd_image: images:almalinux
            channel: stable
          - distro: opensuse-leap
            lxd_image: images:opensuse
            channel: stable
          - distro: opensuse-tumbleweed
            lxd_image: images:opensuse/tumbleweed
            channel: stable
          - distro: archlinux
            lxd_image: images:archlinux
            channel: stable
          - distro: ubuntu
            lxd_image: ubuntu:lts
            channel: edge
          - distro: ubuntu-daily
            lxd_image: ubuntu-daily:devel
            channel: edge
          - distro: ubuntu-core
            lxd_image: ""
            channel: edge
          - distro: debian
            lxd_image: images:debian
            channel: edge
          - distro: debian-stable
            lxd_image: images:debian/stable
            channel: edge
          - distro: fedora
            lxd_image: images:fedora
            channel: edge
          - distro: rockylinux
            lxd_image: images:rockylinux
            channel: edge
          - distro: almalinux
            lxd_image: images:almalinux
            channel: edge
          - distro: opensuse-leap
            lxd_image: images:opensuse
            channel: edge
          - distro: opensuse-tumbleweed
            lxd_image: images:opensuse/tumbleweed
            channel: edge
          - distro: archlinux
            lxd_image: images:archlinux
            channel: edge
    uses: ./.github/workflows/reusable-distro-test.yml
    with:
      distro: ${{ matrix.distro }}
      lxd_image: ${{ matrix.lxd_image }}
      snap_artifact_name: pihole-snap-github-${{ matrix.channel }}-amd64
    secrets: inherit

  publish:
    name: publish github (${{ matrix.channel }}, ${{ matrix.arch }})
    needs: [smoke]
    runs-on: ubuntu-26.04
    environment: snap-publishing
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        arch: [amd64, arm64]
        channel: [stable, edge]
    steps:
      - uses: actions/checkout@v6

      - name: Download snap
        uses: actions/download-artifact@v7
        with:
          name: pihole-snap-github-${{ matrix.channel }}-${{ matrix.arch }}
          path: .

      - name: Get snap filename and release channel
        id: snap
        run: |
          SNAP_FILE=$(ls ${{ env.SNAP_NAME }}_*.snap | head -n1)
          echo "file=${SNAP_FILE}" >> $GITHUB_OUTPUT

          # Extract the version from the snap filename (e.g., pihole-by-rajannpatel_v6.6.2_amd64.snap -> v6.6.2)
          SNAP_VERSION=$(echo "$SNAP_FILE" | cut -d'_' -f2)

          # Strip leading 'v' if present and get the major version number (e.g., v6.6.2 -> 6)
          MAJOR_VERSION=$(echo "${SNAP_VERSION#v}" | cut -d'.' -f1)
          echo "track=${MAJOR_VERSION}" >> $GITHUB_OUTPUT

          if [ "${{ matrix.channel }}" = "edge" ]; then
            echo "channels=latest/edge" >> $GITHUB_OUTPUT
          else
            echo "channels=latest/stable" >> $GITHUB_OUTPUT
          fi

      - name: Publish to Snap Store
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          if [ -n "${SNAPCRAFT_STORE_CREDENTIALS:-}" ]; then
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                echo "::add-mask::$line"
              fi
            done <<< "${SNAPCRAFT_STORE_CREDENTIALS}"
          fi

          sudo snap install --classic snapcraft

          MAX_ATTEMPTS=3
          attempt=1
          success=0

          while [ $attempt -le $MAX_ATTEMPTS ]; do
            echo "Uploading snap (attempt $attempt of $MAX_ATTEMPTS)..."
            set +e
            UPLOAD_OUT=$(/snap/bin/snapcraft upload "${{ steps.snap.outputs.file }}" --release "${{ steps.snap.outputs.channels }}" 2>&1)
            RC=$?
            set -e

            if [ $RC -eq 0 ]; then
              echo "Upload succeeded."
              success=1
              break
            fi

            if echo "$UPLOAD_OUT" | grep -q "A file with this exact same content has already been uploaded"; then
              echo "::notice::Snap with the same content is already uploaded. Skipping duplicate upload."
              success=1
              break
            fi

            echo "::warning::Snapcraft upload attempt $attempt failed with exit code $RC. Retrying in 15 seconds..."
            attempt=$((attempt + 1))
            sleep 15
          done

          if [ $success -ne 1 ]; then
            echo "::error::Snapcraft upload failed after $MAX_ATTEMPTS attempts."
            exit $RC
          fi

  deploy-pages:
    name: Deploy reports to GitHub Pages
    needs: [lint, build, smoke, vulnerability-scan]
    runs-on: ubuntu-26.04
    environment: snap-publishing
    if: |
      always() &&
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.lint.result == 'success' && needs.build.result == 'success' &&
      needs.smoke.result == 'success' && needs.vulnerability-scan.result == 'success'
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch Snapcraft revisions
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          PUBLISH_RESULT: not_waited
        run: |
          if [ -n "${SNAPCRAFT_STORE_CREDENTIALS:-}" ]; then
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                echo "::add-mask::$line"
              fi
            done <<< "${SNAPCRAFT_STORE_CREDENTIALS}"
          fi

          sudo snap install --classic snapcraft
          EXPECTED=$(git rev-parse --short HEAD)
          echo "Expected commit marker: +git.${EXPECTED}. (publish result: ${PUBLISH_RESULT:-none})"
          fetch_revisions() {
            /snap/bin/snapcraft revisions ${{ env.SNAP_NAME }} > snapcraft-revisions.txt 2>/dev/null || true
          }
          fetch_revisions
          echo "Publish matrix is not a prerequisite for Pages; showing currently visible revisions."

      - name: Download coverage report
        uses: actions/download-artifact@v7
        with:
          name: code-coverage-report
          path: coverage-report

      - name: Download SBOMs
        uses: actions/download-artifact@v7
        with:
          pattern: sbom-*
          path: sbom-artifacts
          merge-multiple: true

      - name: Download vulnerability reports
        uses: actions/download-artifact@v7
        with:
          name: vulnerability-reports
          path: vulnerability-reports

      - name: Organize files for GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_RESULT: not_waited
        run: |
          # Create docs directory structure
          mkdir -p docs/coverage docs/sbom docs/vulnerabilities

          # Copy coverage report (kcov creates index.html automatically)
          if [ -d coverage-report/index ]; then
            cp -r coverage-report/index/* docs/coverage/
          else
            cp -r coverage-report/* docs/coverage/ || true
          fi

          # Apply kcov-override styling and Vanilla layouts to docs/coverage
          echo "Applying Vanilla Framework layout structures and stylesheet overrides to kcov reports..."
          python3 snap/local/build/prettify_coverage.py docs/coverage
          find docs/coverage/ -name "*.css" -exec sh -c "cat snap/local/assets/kcov-override.css > {}" \;

          # Copy SBOMs from all artifact directories
          echo "Finding and copying SBOM files..."
          find sbom-artifacts -name "sbom-*.json" -exec cp -v {} docs/sbom/ \;
          cp -v docs/sbom/sbom-stable-amd64.json docs/sbom/sbom-amd64.json || true
          cp -v docs/sbom/sbom-stable-arm64.json docs/sbom/sbom-arm64.json || true

          # Copy vulnerability reports generated from SBOM artifacts
          cp -r vulnerability-reports/* docs/vulnerabilities/

          # Match the stable source refs used by build jobs before rendering dashboard data.
          python3 snap/local/build/select_snapcraft_upstream.py stable

          # Build dashboard data model used by the interactive homepage
          python3 snap/local/build/generate_dashboard_data.py . docs/dashboard-data.json vulnerability-reports/osv-summary.json

          # Render HTML templates from snap assets
          python3 snap/local/build/render_report_template.py snap/local/assets/dashboard.html docs/index.html
          python3 snap/local/build/render_report_template.py snap/local/assets/sbom-explorer.html docs/sbom/index.html
          cp snap/local/assets/dashboard.css docs/dashboard.css
          cp snap/local/assets/sbom-explorer.css docs/sbom/sbom-explorer.css

          # Copy native Pi-hole logo for header display
          cp snap/gui/pihole.png docs/pihole.png
          cp snap/gui/pihole.png docs/coverage/pihole.png

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
