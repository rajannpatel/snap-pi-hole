name: Reusable Distro Test

on:
  workflow_call:
    inputs:
      distro:
        description: "Unique distro key matching the workflow filename (e.g. debian-12). Used to locate the correct README row."
        required: true
        type: string
      lxd_image:
        description: "LXD image reference (e.g. images:debian or ubuntu:26.04). Containers are preferred; VMs are used as a fallback."
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: Build Snap Package
    runs-on: ubuntu-24.04
    outputs:
      snap_file: ${{ steps.find_snap.outputs.snap_file }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Snap
        uses: snapcore/action-build@v1
        id: snapcraft
        with:
          snapcraft-channel: 9.x/candidate

      - name: Find Built Snap File
        id: find_snap
        run: |
          SNAP_PATH=$(ls *.snap | head -n 1)
          echo "snap_file=$SNAP_PATH" >> $GITHUB_OUTPUT

      - name: Upload Snap Artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-snap-${{ inputs.distro }}
          path: "*.snap"

  distro-test:
    name: Validate Snap Installation
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Snap Artifact
        uses: actions/download-artifact@v4
        with:
          name: built-snap-${{ inputs.distro }}

      # ── LXD path (all distros except ubuntu-core) ──────────────────────────

      - name: Initialize LXD
        if: inputs.distro != 'ubuntu-core'
        run: |
          sudo groupadd --force --system lxd
          sudo usermod -a -G lxd $USER
          # GHA runners have Docker installed which sets iptables FORWARD policy
          # to DROP, blocking NAT traffic from LXD containers. Setting it to
          # ACCEPT restores outbound internet access for containers.
          sudo iptables -P FORWARD ACCEPT
          sudo lxd init --auto

      - name: Launch Container (LXD)
        if: inputs.distro != 'ubuntu-core'
        run: |
          # All tested distros have container images on the images: remote.
          # Containers route through the host bridge NAT and have working
          # internet access on GHA runners, unlike LXD VMs.
          sg lxd -c "lxc launch \"${{ inputs.lxd_image }}\" test-instance"

      - name: Wait for Container to Be Ready (LXD)
        if: inputs.distro != 'ubuntu-core'
        run: |
          sg lxd -c "
            i=1
            while [ \$i -le 30 ]; do
              if lxc exec test-instance -- systemctl is-system-running 2>/dev/null | grep -qE 'running|degraded'; then
                echo \"Container is ready (systemd)!\"
                exit 0
              fi
              if lxc exec test-instance -- rc-status 2>/dev/null | grep -q 'Runlevel'; then
                echo \"Container is ready (OpenRC)!\"
                exit 0
              fi
              echo \"Waiting for container to be ready...\"
              sleep 5
              i=\$((\$i + 1))
            done
            echo \"Container failed to become ready\"
            exit 1
          "

      - name: Install snapd inside Container (LXD)
        if: inputs.distro != 'ubuntu-core'
        run: |
          sg lxd -c "
            set -e
            case '${{ inputs.distro }}' in
              ubuntu|debian)
                lxc exec test-instance -- apt-get update
                lxc exec test-instance -- apt-get install -y snapd
                ;;
              fedora)
                lxc exec test-instance -- dnf install -y snapd
                lxc exec test-instance -- systemctl enable --now snapd.socket
                lxc exec test-instance -- ln -s /var/lib/snapd/snap /snap
                ;;
              rockylinux|almalinux)
                lxc exec test-instance -- dnf install -y epel-release
                lxc exec test-instance -- dnf install -y snapd
                lxc exec test-instance -- systemctl enable --now snapd.socket
                lxc exec test-instance -- ln -s /var/lib/snapd/snap /snap
                ;;
              opensuse-leap*)
                lxc exec test-instance -- zypper addrepo --refresh https://download.opensuse.org/repositories/system:snappy/openSUSE_Leap_15.6/system:snappy.repo
                lxc exec test-instance -- zypper --non-interactive install snapd
                lxc exec test-instance -- systemctl enable --now snapd
                lxc exec test-instance -- ln -s /var/lib/snapd/snap /snap
                ;;
              opensuse-tumbleweed)
                lxc exec test-instance -- zypper --non-interactive install snapd
                lxc exec test-instance -- systemctl enable --now snapd
                lxc exec test-instance -- ln -s /var/lib/snapd/snap /snap
                ;;
              archlinux)
                # Arch requires building snapd from AUR
                lxc exec test-instance -- pacman -Sy --noconfirm base-devel git
                lxc exec test-instance -- useradd -m -d /home/builder -s /bin/bash builder
                lxc exec test-instance -- sh -c 'echo \"builder ALL=(ALL) NOPASSWD: ALL\" >> /etc/sudoers'
                lxc exec test-instance -- sudo -u builder git clone https://aur.archlinux.org/snapd.git /home/builder/snapd
                lxc exec test-instance -- sh -c 'cd /home/builder/snapd && sudo -u builder makepkg -si --noconfirm'
                lxc exec test-instance -- systemctl enable --now snapd.socket
                lxc exec test-instance -- ln -s /var/lib/snapd/snap /snap
                ;;
              alpine)
                lxc exec test-instance -- sh -c 'echo \"http://dl-cdn.alpinelinux.org/alpine/edge/community\" >> /etc/apk/repositories'
                lxc exec test-instance -- apk update
                lxc exec test-instance -- apk add snapd
                lxc exec test-instance -- rc-update add snapd
                lxc exec test-instance -- rc-service snapd start
                ;;
            esac
          "

      - name: Install and Verify Snap on Container (LXD)
        if: inputs.distro != 'ubuntu-core'
        run: |
          sg lxd -c "
            lxc file push ${{ needs.build.outputs.snap_file }} test-instance/tmp/pihole.snap
            lxc exec test-instance -- snap install /tmp/pihole.snap --dangerous
            lxc exec test-instance -- snap alias pihole-by-rajannpatel.pihole pihole
            sleep 10
            lxc exec test-instance -- pihole snap-check
          "

      - name: Detect OS Version and Update README (LXD)
        if: inputs.distro != 'ubuntu-core' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WORKFLOW_KEY: test-${{ inputs.distro }}.yml
        run: |
          # Read /etc/os-release from inside the instance
          OS_RELEASE=$(sg lxd -c "lxc exec test-instance -- cat /etc/os-release" 2>/dev/null || echo "")

          VERSION_ID=$(echo "$OS_RELEASE"       | grep "^VERSION_ID="       | cut -d= -f2 | tr -d '"')
          VERSION_CODENAME=$(echo "$OS_RELEASE" | grep "^VERSION_CODENAME=" | cut -d= -f2 | tr -d '"')
          PRETTY_NAME=$(echo "$OS_RELEASE"      | grep "^PRETTY_NAME="      | cut -d= -f2 | tr -d '"')

          # Rolling distros (Arch, Tumbleweed) have no VERSION_ID — fall back to "Rolling"
          export DISPLAY_VERSION="${VERSION_ID:-Rolling}"
          export DISPLAY_NAME="${VERSION_CODENAME:-${PRETTY_NAME:-}}"

          echo "Detected: version='$DISPLAY_VERSION'  codename='$DISPLAY_NAME'"

          python3 - <<'PYEOF'
          import os, base64, urllib.request, urllib.error, json

          token           = os.environ["GITHUB_TOKEN"]
          repo            = os.environ["GITHUB_REPOSITORY"]
          workflow_key    = os.environ["WORKFLOW_KEY"]
          display_version = os.environ["DISPLAY_VERSION"]
          display_name    = os.environ["DISPLAY_NAME"]

          api     = f"https://api.github.com/repos/{repo}/contents/README.md"
          headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"}

          with urllib.request.urlopen(urllib.request.Request(api, headers=headers)) as r:
              data = json.loads(r.read())

          content = base64.b64decode(data["content"]).decode()
          sha     = data["sha"]

          # Row format: | badge | Distro | VERSION | NAME | status-badge |
          # The workflow filename appears uniquely in each row's status-badge URL.
          def replace_row(line):
              if workflow_key not in line:
                  return line
              parts = line.split("|")
              if len(parts) >= 6:
                  parts[3] = f" {display_version} "
                  if display_name:
                      parts[4] = f" {display_name} "
              return "|".join(parts)

          new_content = "\n".join(replace_row(l) for l in content.splitlines())
          if new_content == content:
              print("README already up to date — nothing to commit.")
              exit(0)

          body = json.dumps({
              "message": f"ci: update tested version for {workflow_key} -> {display_version}",
              "content": base64.b64encode(new_content.encode()).decode(),
              "sha": sha,
              "branch": "main",
          }).encode()

          req = urllib.request.Request(
              api, data=body,
              headers={**headers, "Content-Type": "application/json"},
              method="PUT",
          )
          try:
              with urllib.request.urlopen(req) as r:
                  print("README updated successfully.")
          except urllib.error.HTTPError as e:
              print(f"GitHub API error {e.code}: {e.read().decode()}")
              exit(1)
          PYEOF

      # ── Multipass path (ubuntu-core only) ──────────────────────────────────

      - name: Initialize Multipass Hypervisor
        if: inputs.distro == 'ubuntu-core'
        run: |
          sudo snap install multipass
          sudo snap connect multipass:kvm || true
          sudo multipass set local.driver=qemu

          i=1
          while [ $i -le 20 ]; do
            if sudo multipass list >/dev/null 2>&1; then
              echo "Multipass is ready!"
              exit 0
            fi
            echo "Waiting for Multipass daemon..."
            sleep 3
            i=$((i + 1))
          done

          echo "Multipass daemon failed to start. Logs:"
          sudo journalctl -n 50 -u snap.multipass.multipassd.service
          exit 1

      - name: Launch VM (Multipass)
        if: inputs.distro == 'ubuntu-core'
        run: |
          echo "Launching Ubuntu Core VM using image: core26"
          sudo multipass launch core26 --name test-instance --cpus 2 --memory 4G --disk 10G

      - name: Wait for VM to Boot (Multipass)
        if: inputs.distro == 'ubuntu-core'
        run: |
          wait_for_snapd_stability() {
              echo "Ensuring snapd is completely stable and idle..."
              local idle_checks=0
              local max_idle_checks=3

              while [ $idle_checks -lt $max_idle_checks ]; do
                  if ! sudo multipass exec test-instance -- echo "Online" >/dev/null 2>&1; then
                      echo "VM is offline/rebooting. Waiting for it to come online..."
                      sleep 10
                      idle_checks=0
                      continue
                  fi

                  if sudo multipass exec test-instance -- test -f /run/systemd/shutdown/scheduled 2>/dev/null; then
                      echo "A system reboot is scheduled by snapd. Rebooting immediately..."
                      sudo multipass exec test-instance -- sudo reboot || true
                      echo "Waiting for VM to go offline..."
                      sleep 10
                      idle_checks=0
                      continue
                  fi

                  if sudo multipass exec test-instance -- snap changes 2>/dev/null | grep -q "Doing"; then
                      echo "Snapd is busy. Waiting 10 seconds..."
                      sleep 10
                      idle_checks=0
                      continue
                  fi

                  idle_checks=$((idle_checks + 1))
                  echo "Snapd is idle (check $idle_checks/$max_idle_checks)..."
                  sleep 5
              done
              echo "Snapd is fully stable and idle!"
          }

          wait_for_snapd_stability

      - name: Install and Verify Snap (Multipass)
        if: inputs.distro == 'ubuntu-core'
        run: |
          sudo multipass transfer ${{ needs.build.outputs.snap_file }} test-instance:/home/ubuntu/pihole.snap
          sudo multipass exec test-instance -- sudo snap install /home/ubuntu/pihole.snap --dangerous

          for plug in network-bind network-control firewall-control network-observe \
                      system-observe hardware-observe mount-observe process-control time-control; do
            sudo multipass exec test-instance -- sudo snap connect "pihole-by-rajannpatel:$plug" || true
          done

          sudo multipass exec test-instance -- sudo snap alias pihole-by-rajannpatel.pihole pihole

      - name: Run Snap Diagnostics (Multipass)
        if: inputs.distro == 'ubuntu-core'
        run: |
          sudo multipass exec test-instance -- pihole snap-check

      - name: Cleanup VM (Multipass)
        if: always() && inputs.distro == 'ubuntu-core'
        run: |
          sudo multipass delete --purge test-instance || true
